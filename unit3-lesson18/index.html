ε;", "audio": "hypertts-732b4da70bb75391b1df848700c4794ccd8937b0262cc95bb43718e3.mp3"}, {"front": "Didn't you guys want it?", "back": "δεν το θέλατε;", "audio": "hypertts-6bc56ca1ebaf5236ca9456c67e8a90dff6534a5e9e5402881dd44599.mp3"}, {"front": "When did you all leave?", "back": "πότε φύγατε;", "audio": "hypertts-316cd99895364badef2030558e55fe99a305eb5f2180dd8488609210.mp3"}, {"front": "I arrived when you all were leaving", "back": "έφτασα όταν φεύγατε", "audio": "hypertts-d1cdab8366ed650cf3d4cb12dcaac1bcbe28a316e8c11d2c40a927a0.mp3"}, {"front": "You guys have", "back": "έχετε", "audio": "hypertts-69f608b7169dbce3e948a3c163d80a01e83334c8d952a5377210e98c.mp3"}, {"front": "Have you guys arrived already?", "back": "έχετε φτάσει ήδη;", "audio": "hypertts-a0780c1b6c3a28a2a39ce20556f70160821d973ed4084829ace3207b.mp3"}, {"front": "Had you guys arrived already?", "back": "είχατε φτάσει ήδη;", "audio": "hypertts-894c1c8d4c74dca7e1df1822a839b58ef3f44731a1b9ab783c25553c.mp3"}, {"front": "If you guys had taken the other road you would have already arrived", "back": "αν είχατε πάρει τον άλλον δρόμο θα είχατε φτάσει ήδη", "audio": "hypertts-3b2d58d08f2a86d76811c3dcb116f5484cc7d89c1075c348ac67c8b9.mp3"}, {"front": "You say / you tell (plural)", "back": "λέτε", "audio": "hypertts-b222248de369f098673be2069eb0286da8a138d2e765c134bfcdbc59.mp3"}, {"front": "What do you guys say?", "back": "τι λέτε;", "audio": "hypertts-2f22fccc802aa4b50288bb6faebd81eb330c2ed9f1aad8613fe0c897.mp3"}, {"front": "What did you guys say?", "back": "τι είπατε;", "audio": "hypertts-d4b31ad5b56979c102c0df80eec76a5537fc147bb5d56e689b7f5891.mp3"}, {"front": "What are you guys eating?", "back": "τι τρώτε;", "audio": "hypertts-399954adc35bbee3623dd02b8862e7aed6002ee2ce8afad3865bb3d2.mp3"}, {"front": "What did you guys eat?", "back": "τι φάγατε;", "audio": "hypertts-d129aafa74c0642009114380ccfab622050895fb9b1d0ae18a279f39.mp3"}, {"front": "If you guys had told me it I would know it", "back": "αν μου το είχατε πει θα function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
let deck=shuffle(CARDS);let pos=0;let currentAudio=null;
function updateProgress(){
  document.getElementById('current-num').textContent=pos+1;
  document.getElementById('total-num').textContent=deck.length;
  document.getElementById('prog').style.width=Math.round(((pos+1)/deck.length)*100)+'%';
  document.getElementById('prev-btn').disabled=pos===0;
}
function showCard(){
  const card=deck[pos];
  document.getElementById('card-inner').classList.remove('flipped');
  document.getElementById('eng-text').textContent=card.front;
  document.getElementById('greek-text').textContent=card.back;
  document.getElementById('audio-btn').classList.remove('playing');
  document.getElementById('tap-hint').style.display='';
  if(currentAudio){currentAudio.pause();currentAudio=null;}
  updateProgress();
}
function flipCard(){
  const flipped=document.getElementById('card-inner').classList.toggle('flipped');
  if(flipped){document.getElementById('tap-hint').style.display='none';playAudio();}
  else{document.getElementById('tap-hint').style.display='';}
}
function playAudio(){
  const card=deck[pos];
  if(currentAudio){currentAudio.pause();currentAudio=null;}
  const btn=document.getElementById('audio-btn');
  const audio=new Audio(AUDIO_PATH+card.audio);
  currentAudio=audio;btn.classList.add('playing');
  audio.play().catch(()=>{});
  audio.onended=()=>{btn.classList.remove('playing');currentAudio=null;};
  audio.onerror=()=>{btn.classList.remove('playing');currentAudio=null;};
}
function nextCard(){if(pos<deck.length-1){pos++;showCard();}else{showDone();}}
function prevCard(){if(pos>0){pos--;showCard();}}
function showDone(){
  document.getElementById('study-view').classList.add('hidden');
  document.getElementById('done-view').classList.remove('hidden');
}
function restart(){
  deck=shuffle(CARDS);pos=0;
  document.getElementById('done-view').classList.add('hidden');
  document.getElementById('study-view').classList.remove('hidden');
  showCard();
}
showCard();
</script>
</body>
