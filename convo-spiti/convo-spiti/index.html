<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Polylogue — Conversation Lab: Το σπίτι μου</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f4f0; min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 2rem 1rem; color: #1a1a1a; }
  #app { width: 100%; max-width: 520px; }
  header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; }
  .back-link { font-size: 13px; color: #888; text-decoration: none; display: flex; align-items: center; gap: 5px; }
  .back-link:hover { color: #1a1a1a; }
  .deck-tag { font-size: 12px; color: #888; background: #fff; border: 1px solid #e5e5e5; padding: 4px 12px; border-radius: 99px; }
  .progress-bar { height: 3px; background: #e5e5e5; border-radius: 99px; overflow: hidden; margin-bottom: 1.25rem; }
  .progress-fill { height: 100%; background: #534AB7; border-radius: 99px; transition: width 0.4s ease; width: 0%; }
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 1.5rem; }
  .stat { background: #fff; border: 1px solid #e5e5e5; border-radius: 10px; padding: 12px; text-align: center; }
  .stat-num { font-size: 22px; font-weight: 600; color: #1a1a1a; }
  .stat-label { font-size: 11px; color: #999; margin-top: 2px; text-transform: uppercase; letter-spacing: 0.04em; }
  .card-scene { perspective: 1200px; margin-bottom: 1rem; cursor: pointer; user-select: none; }
  .card-inner { position: relative; width: 100%; transform-style: preserve-3d; transition: transform 0.45s cubic-bezier(0.4,0,0.2,1); }
  .card-inner.flipped { transform: rotateY(180deg); }
  .card-face { backface-visibility: hidden; -webkit-backface-visibility: hidden; background: #fff; border: 1px solid #e5e5e5; border-radius: 16px; padding: 2.5rem 2rem; min-height: 200px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; }
  .card-back { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: rotateY(180deg); }
  .card-label { font-size: 11px; color: #bbb; letter-spacing: 0.08em; text-transform: uppercase; }
  .card-text { font-size: 24px; font-weight: 500; color: #1a1a1a; text-align: center; line-height: 1.35; }
  .card-text.greek { font-size: 26px; }
  .audio-btn { display: flex; align-items: center; gap: 7px; padding: 7px 16px; border: 1px solid #e0e0e0; border-radius: 99px; background: transparent; color: #888; font-size: 13px; cursor: pointer; transition: background 0.15s; font-family: inherit; }
  .audio-btn:hover { background: #f5f4f0; }
  .audio-btn.playing { color: #534AB7; border-color: #534AB7; }
  .tap-hint { text-align: center; font-size: 13px; color: #bbb; margin-bottom: 1rem; height: 20px; }
  .rating-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 1.5rem; }
  .rating-btn { padding: 12px 4px; border-radius: 10px; border: 1px solid #e5e5e5; background: #fff; cursor: pointer; font-size: 13px; font-weight: 500; font-family: inherit; display: flex; flex-direction: column; align-items: center; gap: 4px; transition: background 0.15s; }
  .rating-btn:hover { background: #f5f4f0; }
  .rating-btn .icon { font-size: 16px; }
  .rating-btn .rlabel { font-size: 10px; color: #aaa; font-weight: 400; }
  .r-again .icon { color: #C0392B; } .r-hard .icon { color: #E67E22; } .r-good .icon { color: #2980B9; } .r-easy .icon { color: #534AB7; }
  .hidden { display: none !important; }
  .done-screen { background: #fff; border: 1px solid #e5e5e5; border-radius: 16px; padding: 2.5rem 2rem; text-align: center; }
  .done-title { font-size: 22px; font-weight: 600; color: #1a1a1a; margin-bottom: 8px; }
  .done-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 1.5rem; }
  .done-explainer { background: #f5f4f0; border-radius: 10px; padding: 12px 16px; margin-bottom: 1.5rem; font-size: 12px; color: #888; line-height: 1.6; text-align: left; }
  .done-explainer strong { color: #555; font-weight: 500; }
  .done-sub { font-size: 14px; color: #888; margin-bottom: 1.5rem; }
  .btn-row { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
  .action-btn { padding: 11px 28px; border: 1px solid #e0e0e0; border-radius: 10px; background: transparent; color: #1a1a1a; font-size: 14px; font-family: inherit; cursor: pointer; transition: background 0.15s; text-decoration: none; display: inline-block; }
  .action-btn:hover { background: #f5f4f0; }
  @media (max-width: 400px) { .card-text { font-size: 18px; } .card-text.greek { font-size: 20px; } .card-face { padding: 2rem 1.25rem; min-height: 170px; } }
</style>
</head>
<body>
<div id="app">
  <header>
    <a href="/" class="back-link">
      <svg width="14" height="14" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 2L4 6l4 4"/></svg>
      All lessons
    </a>
    <span class="deck-tag">Conversation Lab</span>
  </header>

  <div id="study-view">
    <div class="progress-bar"><div class="progress-fill" id="prog"></div></div>
    <div class="stats">
      <div class="stat"><div class="stat-num" id="s-due">0</div><div class="stat-label">Due</div></div>
      <div class="stat"><div class="stat-num" id="s-good">0</div><div class="stat-label">Good</div></div>
      <div class="stat"><div class="stat-num" id="s-again">0</div><div class="stat-label">Again</div></div>
    </div>
    <div class="card-scene" onclick="flipCard()">
      <div class="card-inner" id="card-inner">
        <div class="card-face">
          <span class="card-label">English</span>
          <div class="card-text" id="eng-text">—</div>
        </div>
        <div class="card-face card-back">
          <span class="card-label">Greek</span>
          <div class="card-text greek" id="greek-text">—</div>
          <button class="audio-btn" id="audio-btn" onclick="event.stopPropagation(); playAudio()">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M3 6H1v4h2l4 3V3L3 6zM11.5 8c0-1.5-.8-2.8-2-3.5v7c1.2-.7 2-2 2-3.5zM14 8c0-2.8-1.6-5.2-4-6.3v1.1C11.8 3.7 13 5.7 13 8s-1.2 4.3-3 5.2v1.1C12.4 13.2 14 10.8 14 8z"/></svg>
            Listen
          </button>
        </div>
      </div>
    </div>
    <p class="tap-hint" id="tap-hint">Tap to reveal the Greek</p>
    <div class="rating-row hidden" id="rating-row">
      <button class="rating-btn r-again" onclick="rate(0)"><span class="icon">✕</span><span class="rlabel">Again</span></button>
      <button class="rating-btn r-hard" onclick="rate(1)"><span class="icon">~</span><span class="rlabel">Hard</span></button>
      <button class="rating-btn r-good" onclick="rate(2)"><span class="icon">✓</span><span class="rlabel">Good</span></button>
      <button class="rating-btn r-easy" onclick="rate(3)"><span class="icon">✓✓</span><span class="rlabel">Easy</span></button>
    </div>
  </div>

  <div id="done-view" class="done-screen hidden">
    <div class="done-title">Session complete</div>
    <div class="done-stats">
      <div class="stat"><div class="stat-num" id="d-good">0</div><div class="stat-label">Good</div></div>
      <div class="stat"><div class="stat-num" id="d-again">0</div><div class="stat-label">Again</div></div>
      <div class="stat"><div class="stat-num" id="d-total">0</div><div class="stat-label">Total</div></div>
    </div>
    <div class="done-explainer">Your cards have been scheduled. <strong>Come back tomorrow</strong> to review what's due — fewer cards, but the ones that matter most.</div>
    <div class="done-sub" id="done-msg"></div>
    <div class="btn-row">
      <button class="action-btn" onclick="restartAll()">Start over</button>
      <a href="/" class="action-btn">All lessons</a>
    </div>
  </div>
</div>
<script>
const AUDIO_PATH='audio/';
const STORAGE_KEY='polylogue_convo_spiti_v1';
const CARDS=[{"front": "I live", "back": "μένω", "audio": "hypertts-83be5f42d58d1b2042c543bc7949bfbb3ecec162590a6c502f442803.mp3"}, {"front": "the house", "back": "το σπίτι", "audio": "hypertts-343d16f64e36fe23a9ee4dbd35c90b5433a1eb0b4153297489f45d9e.mp3"}, {"front": "the flat", "back": "το διαμέρισμα", "audio": "hypertts-995a36227a4511a73b18772d6f84e0672b5d16a0be4e93e1c2ee3b3b.mp3"}, {"front": "the city", "back": "η πόλη", "audio": "hypertts-725a22086356553084e3b6bc635c0b31bccc7c8561c05a7ba284824b.mp3"}, {"front": "the neighbourhood", "back": "η γειτονιά", "audio": "hypertts-902b788df857584412fb9caacd97973a8af9bac08b8cf92273f108eb.mp3"}, {"front": "the city centre", "back": "το κέντρο", "audio": "hypertts-eae21f1c09a5384d049f24720e2b92fffba341065019ef645e87b39a.mp3"}, {"front": "the countryside", "back": "η εξοχή", "audio": "hypertts-3aae7deeac3507a59b7cfd7c0997f85d65fa9107a332414e42e7a43b.mp3"}, {"front": "close to", "back": "κοντά στο", "audio": "hypertts-43ef95e3fca3d881964765873de2b6ffbc7dd92bb07466b58845b990.mp3"}, {"front": "far from", "back": "μακριά από", "audio": "hypertts-4d1e4575e9f92e4ff8cfde78222eaae0651dc1942662cf7a4246ba32.mp3"}, {"front": "the suburbs", "back": "τα περίχωρα", "audio": "hypertts-627b7372362231ef73691b6c2e9cdcc1a58181e9bdde31a6c6ae4e61.mp3"}, {"front": "remote area", "back": "απομακρυσμένη περιοχή", "audio": "hypertts-249701ba9c81c947cca83a76b9b17058ed8d6ea904f0f40b235d471d.mp3"}, {"front": "it has good transport links", "back": "έχει καλές συγκοινωνίες", "audio": "hypertts-0a005420cb231ca7c945869e375858f5263aff5f5691df45132f1946.mp3"}, {"front": "family area", "back": "οικογενειακή περιοχή", "audio": "hypertts-79c2f3fecfc21a6ac233254f9da7c433d80b1e0232e8c21f41cef14f.mp3"}, {"front": "busy area", "back": "πολυσύχναστη περιοχή", "audio": "hypertts-cb1cece935237b6d62aea84ff323d36f9c93726a90b6101980ea8ea8.mp3"}, {"front": "the room", "back": "το δωμάτιο", "audio": "hypertts-6b492100889bf64a4735b8a1dd60e7b9bf47dc491dc509cb669f5307.mp3"}, {"front": "the kitchen", "back": "η κουζίνα", "audio": "hypertts-8ee166deaf24a3878187e716dcdbea9ac1113070ba07e049e7dfd270.mp3"}, {"front": "the living room", "back": "το σαλόνι", "audio": "hypertts-aa26853883ba040d6160afdcaeb57d6b9d448d79d65dd2fc9a61b135.mp3"}, {"front": "the bedroom", "back": "η κρεβατοκάμαρα", "audio": "hypertts-868b967cd10c0b8f9e710fb6d63b2f1ab7ee092e9387067b9fd42dbe.mp3"}, {"front": "the bathroom", "back": "το μπάνιο", "audio": "hypertts-cfd54df1e14a57206393129ebfc60885bb8591c87499f04ab3157c37.mp3"}, {"front": "the garden", "back": "ο κήπος", "audio": "hypertts-24705250352b235ad08baa3ffe535679f6480f78b7de541a8ff68e3a.mp3"}, {"front": "the balcony", "back": "το μπαλκόνι", "audio": "hypertts-35199dc80c01cbed84cfecfe7d95b1c5fec2a1011180d6f3fa873a69.mp3"}, {"front": "the window", "back": "το παράθυρο", "audio": "hypertts-114b72bd7c60e5f661887a275590cfc1285ffec990402933ef0613de.mp3"}, {"front": "big", "back": "μεγάλος/η", "audio": "hypertts-f9fdbd40816ca3572209c15c187ab6f7b6623e2178ebd10f36282462.mp3"}, {"front": "small", "back": "μικρός/η", "audio": "hypertts-66e26f1b2906cdab1e7eb1aa2bd9a56224f04c364cccb7df4a9ada27.mp3"}, {"front": "quiet", "back": "ήσυχος/η", "audio": "hypertts-9748617b97d0d50054d85a53c38ef0a51518168fe14fdbc58382375e.mp3"}, {"front": "noisy", "back": "φασαριόζικος/η", "audio": "hypertts-0d273d08cf57ebcb246c3f1cffb2ae6b67b7aa2b3dacecb577307217.mp3"}, {"front": "old", "back": "παλιός/ιά", "audio": "hypertts-936ca7c2e1c01739a18c9c69447721f5050ce3de4304c01f2f28961c.mp3"}, {"front": "new", "back": "καινούργιος/α", "audio": "hypertts-f3c2c6a5cadb26373c9216fd498c2242e06e44c95de781893e893b0a.mp3"}, {"front": "comfortable", "back": "άνετος/η", "audio": "hypertts-8f978dd65f88420ff50dd8e6a49f85680e295c9d75ac04f0aca4702c.mp3"}, {"front": "warm / cosy", "back": "ζεστός/η", "audio": "hypertts-8bfb3947092e11aebb0696c5a077d7ec2b851254b932228739b7b2f6.mp3"}, {"front": "green", "back": "πράσινος/η", "audio": "hypertts-84afa1c3db4b88ce4cb9ce1806c78578b1b073ea85c47e6f4b00a2a8.mp3"}, {"front": "luxurious", "back": "χλιδάτος/η", "audio": "hypertts-fb8e0b8c05e3a067dd28fb953e0d844301cf59c554edd12a23fbe746.mp3"}, {"front": "I live in…", "back": "Μένω σε…", "audio": "hypertts-f7531d5572b2093c3a4e1d63c7dfcdb9d1731c253fabe897fad44ab5.mp3"}, {"front": "It has… rooms", "back": "Έχει… δωμάτια", "audio": "hypertts-a6d06ebe2f44048203b31c19de9faeb5dfca8c3d1f0f1d259b0ad57a.mp3"}, {"front": "I like it because…", "back": "Μου αρέσει γιατί…", "audio": "hypertts-bfed570c77a5fa0bdaaf499ffa8d34cdc009c0d07a60e90d5bca3b23.mp3"}, {"front": "I don't like that…", "back": "Δεν μου αρέσει που…", "audio": "hypertts-e15b3c1da1120c0043e135b31c4881386fb13eb5ab34150a849ce99e.mp3"}, {"front": "My favourite room is…", "back": "Το αγαπημένο μου δωμάτιο είναι…", "audio": "hypertts-93b753d639869e3633015857753b295642bb223b626dc90e6e907a0e.mp3"}, {"front": "I would like to live in…", "back": "Θα ήθελα να μένω σε…", "audio": "hypertts-e48baa4b1ee2ba9ff9e20cbff3ea1b44c64c79439c3f09a2efd31d18.mp3"}];

function loadState(){try{const r=localStorage.getItem(STORAGE_KEY);if(r)return JSON.parse(r);}catch(e){}return null;}
function saveState(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(state));}catch(e){}}
function buildDeck(){return CARDS.map(c=>({...c,interval:1,ef:2.5,nextDue:0,reps:0}));}
function startSession(deck){
  const today=Math.floor(Date.now()/86400000);
  const due=deck.map((_,i)=>i).filter(i=>deck[i].nextDue<=today).sort(()=>Math.random()-0.5);
  return {queue:due,againQueue:[],goodCount:0,againCount:0,done:false};
}
let state=loadState();
if(!state){const deck=buildDeck();state={deck,session:startSession(deck)};saveState();}
else if(!state.session||state.session.done){state.session=startSession(state.deck);saveState();}
let currentAudio=null,currentIdx=null;
function nextCard(){const s=state.session;if(s.againQueue.length>0)return s.againQueue[0];if(s.queue.length>0)return s.queue[0];return null;}
function updateStats(){
  const s=state.session;
  document.getElementById('s-due').textContent=s.queue.length+s.againQueue.length;
  document.getElementById('s-good').textContent=s.goodCount;
  document.getElementById('s-again').textContent=s.againCount;
  const total=s.queue.length+s.againQueue.length+s.goodCount;
  document.getElementById('prog').style.width=total>0?Math.round((s.goodCount/total)*100)+'%':'0%';
}
function showCard(idx){
  currentIdx=idx;const card=state.deck[idx];
  document.getElementById('card-inner').classList.remove('flipped');
  document.getElementById('eng-text').textContent=card.front;
  document.getElementById('greek-text').textContent=card.back;
  document.getElementById('rating-row').classList.add('hidden');
  document.getElementById('tap-hint').style.display='';
  document.getElementById('audio-btn').classList.remove('playing');
  if(currentAudio){currentAudio.pause();currentAudio=null;}
  updateStats();
}
function flipCard(){
  if(currentIdx===null)return;
  const flipped=document.getElementById('card-inner').classList.toggle('flipped');
  if(flipped){document.getElementById('rating-row').classList.remove('hidden');document.getElementById('tap-hint').style.display='none';playAudio();}
}
function playAudio(){
  if(currentIdx===null)return;
  const card=state.deck[currentIdx];
  if(currentAudio){currentAudio.pause();currentAudio=null;}
  const btn=document.getElementById('audio-btn');
  const audio=new Audio(AUDIO_PATH+card.audio);
  currentAudio=audio;btn.classList.add('playing');
  audio.play().catch(()=>{});
  audio.onended=()=>{btn.classList.remove('playing');currentAudio=null;};
  audio.onerror=()=>{btn.classList.remove('playing');currentAudio=null;};
}
function sm2(card,q){
  if(q===0){card.reps=0;card.interval=1;}
  else if(q===1){card.interval=Math.max(1,Math.round(card.interval*1.2));}
  else if(q===2){if(card.reps===0)card.interval=1;else if(card.reps===1)card.interval=6;else card.interval=Math.round(card.interval*card.ef);card.reps+=1;}
  else{if(card.reps===0)card.interval=1;else if(card.reps===1)card.interval=6;else card.interval=Math.round(card.interval*card.ef*1.3);card.reps+=1;}
  card.ef=Math.max(1.3,card.ef+0.1-(3-q)*(0.08+(3-q)*0.02));
  card.nextDue=Math.floor(Date.now()/86400000)+card.interval;
}
function rate(q){
  if(currentIdx===null)return;
  const s=state.session;
  const fromAgain=s.againQueue.length>0&&s.againQueue[0]===currentIdx;
  if(q===0){if(fromAgain){s.againQueue.shift();}else{s.queue.shift();}s.againQueue.push(currentIdx);s.againCount++;}
  else{sm2(state.deck[currentIdx],q);if(fromAgain){s.againQueue.shift();}else{s.queue.shift();}s.goodCount++;}
  saveState();
  const next=nextCard();
  if(next===null){showDone();}else{showCard(next);}
}
function showDone(){
  state.session.done=true;saveState();
  document.getElementById('study-view').classList.add('hidden');
  document.getElementById('done-view').classList.remove('hidden');
  document.getElementById('d-good').textContent=state.session.goodCount;
  document.getElementById('d-again').textContent=state.session.againCount;
  document.getElementById('d-total').textContent=state.session.goodCount+state.session.againCount;
  const today=Math.floor(Date.now()/86400000);
  const due=state.deck.filter(c=>c.nextDue<=today).length;
  document.getElementById('done-msg').textContent=due>0?due+' cards due right now.':'No cards due today — check back tomorrow.';
}
function restartAll(){
  state.deck=buildDeck();state.session=startSession(state.deck);saveState();
  document.getElementById('done-view').classList.add('hidden');
  document.getElementById('study-view').classList.remove('hidden');
  const next=nextCard();if(next!==null)showCard(next);else showDone();
}
const first=nextCard();
if(first!==null){showCard(first);}else{showDone();}
</script>
</body>
</html>
