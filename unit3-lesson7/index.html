<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Polylogue — Lesson 7: Alone, Together & μόνος</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f4f0; min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 2rem 1rem; color: #1a1a1a; }
  #app { width: 100%; max-width: 520px; }
  header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; }
  .back-link { font-size: 13px; color: #888; text-decoration: none; display: flex; align-items: center; gap: 5px; }
  .back-link:hover { color: #1a1a1a; }
  .deck-tag { font-size: 12px; color: #888; background: #fff; border: 1px solid #e5e5e5; padding: 4px 12px; border-radius: 99px; }
  .progress-bar { height: 3px; background: #e5e5e5; border-radius: 99px; overflow: hidden; margin-bottom: 1.25rem; }
  .progress-fill { height: 100%; background: #1D9E75; border-radius: 99px; transition: width 0.4s ease; width: 0%; }
  .counter { text-align: center; font-size: 13px; color: #888; margin-bottom: 1.5rem; letter-spacing: 0.02em; }
  .counter strong { color: #1a1a1a; font-weight: 600; }
  .card-scene { perspective: 1200px; margin-bottom: 1rem; cursor: pointer; user-select: none; }
  .card-inner { position: relative; width: 100%; transform-style: preserve-3d; transition: transform 0.45s cubic-bezier(0.4,0,0.2,1); }
  .card-inner.flipped { transform: rotateY(180deg); }
  .card-face { backface-visibility: hidden; -webkit-backface-visibility: hidden; background: #fff; border: 1px solid #e5e5e5; border-radius: 16px; padding: 2.5rem 2rem; min-height: 200px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; }
  .card-back { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: rotateY(180deg); }
  .card-label { font-size: 11px; color: #bbb; letter-spacing: 0.08em; text-transform: uppercase; }
  .card-text { font-size: 24px; font-weight: 500; color: #1a1a1a; text-align: center; line-height: 1.35; }
  .card-text.greek { font-size: 26px; }
  .audio-btn { display: flex; align-items: center; gap: 7px; padding: 7px 16px; border: 1px solid #e0e0e0; border-radius: 99px; background: transparent; color: #888; font-size: 13px; cursor: pointer; transition: background 0.15s; font-family: inherit; }
  .audio-btn:hover { background: #f5f4f0; color: #555; }
  .audio-btn.playing { color: #1D9E75; border-color: #1D9E75; }
  .tap-hint { text-align: center; font-size: 13px; color: #bbb; margin-bottom: 1rem; height: 20px; }
  .nav-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 1.5rem; }
  .nav-btn { padding: 14px 4px; border-radius: 10px; border: 1px solid #e5e5e5; background: #fff; cursor: pointer; font-size: 14px; font-weight: 500; font-family: inherit; color: #1a1a1a; transition: background 0.15s, opacity 0.15s; display: flex; align-items: center; justify-content: center; gap: 6px; }
  .nav-btn:hover:not(:disabled) { background: #f5f4f0; }
  .nav-btn.primary { background: #1D9E75; color: #fff; border-color: #1D9E75; }
  .nav-btn.primary:hover { opacity: 0.9; }
  .nav-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .hidden { display: none !important; }
  .done-screen { background: #fff; border: 1px solid #e5e5e5; border-radius: 16px; padding: 2.5rem 2rem; text-align: center; }
  .done-title { font-size: 22px; font-weight: 600; color: #1a1a1a; margin-bottom: 8px; }
  .done-sub { font-size: 14px; color: #888; margin-bottom: 1.5rem; line-height: 1.5; }
  .btn-row { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
  .action-btn { padding: 11px 28px; border: 1px solid #e0e0e0; border-radius: 10px; background: transparent; color: #1a1a1a; font-size: 14px; font-family: inherit; cursor: pointer; transition: background 0.15s, opacity 0.15s; text-decoration: none; display: inline-block; }
  .action-btn:hover { background: #f5f4f0; }
  .action-btn.primary { background: #1D9E75; color: #fff; border-color: #1D9E75; }
  .action-btn.primary:hover { opacity: 0.9; }
  @media (max-width: 400px) { .card-text { font-size: 18px; } .card-text.greek { font-size: 20px; } .card-face { padding: 2rem 1.25rem; min-height: 170px; } }
</style>
</head>
<body>
<div id="app">
  <header>
    <a href="/" class="back-link">
      <svg width="14" height="14" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 2L4 6l4 4"/></svg>
      All lessons
    </a>
    <span class="deck-tag">Unit 3 · Lesson 7</span>
  </header>
  <div id="study-view">
    <div class="progress-bar"><div class="progress-fill" id="prog"></div></div>
    <div class="counter"><strong id="current-num">1</strong> of <span id="total-num">0</span></div>
    <div class="card-scene" onclick="flipCard()">
      <div class="card-inner" id="card-inner">
        <div class="card-face">
          <span class="card-label">English</span>
          <div class="card-text" id="eng-text">—</div>
        </div>
        <div class="card-face card-back">
          <span class="card-label">Greek</span>
          <div class="card-text greek" id="greek-text">—</div>
          <button class="audio-btn" id="audio-btn" onclick="event.stopPropagation(); playAudio()">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M3 6H1v4h2l4 3V3L3 6zM11.5 8c0-1.5-.8-2.8-2-3.5v7c1.2-.7 2-2 2-3.5zM14 8c0-2.8-1.6-5.2-4-6.3v1.1C11.8 3.7 13 5.7 13 8s-1.2 4.3-3 5.2v1.1C12.4 13.2 14 10.8 14 8z"/></svg>
            Listen
          </button>
        </div>
      </div>
    </div>
    <p class="tap-hint" id="tap-hint">Tap to reveal the Greek</p>
    <div class="nav-row">
      <button class="nav-btn" onclick="prevCard()" id="prev-btn">← Previous</button>
      <button class="nav-btn primary" onclick="nextCard()" id="next-btn">Next →</button>
    </div>
  </div>
  <div id="done-view" class="done-screen hidden">
    <div class="done-title">Deck complete</div>
    <div class="done-sub">You've gone through all the cards. Practice makes perfect — go again!</div>
    <div class="btn-row">
      <button class="action-btn primary" onclick="restart()">Practice again</button>
      <a href="/" class="action-btn">All lessons</a>
    </div>
  </div>
</div>
<script>
const AUDIO_PATH='audio/';
const CARDS=[{"front": "My stomach", "back": "Το στομάχι μου", "audio": "hypertts-1e2df8414f2022d739f422d0862ca15d0c25d88dc7f14bd16cc05cdd.mp3"}, {"front": "I hurt", "back": "Πονάω", "audio": "hypertts-0e4566c7c173ecae1965a4c7ae3c79b42853b21470ac60f47c98de9b.mp3"}, {"front": "My stomach hurts", "back": "Το στομάχι μου πονάει", "audio": "hypertts-0c3eabc4795737cc97769f790f1db69b282bac3e77b1f04e1273eb26.mp3"}, {"front": "My mouth", "back": "το στόμα μου", "audio": "hypertts-eb47789bced459f0cdc3e85a04dd0b5a5de6a51170ebb34aa536c309.mp3"}, {"front": "Your mouth", "back": "το στόμα σου", "audio": "hypertts-6ee0fb2f1cccd114604bdacd4e374109234d7fcbdad5ad8e1fa66763.mp3"}, {"front": "His mouth", "back": "το στόμα του", "audio": "hypertts-098576ad3a8d4140b0407dca86595573fd948a91d0f2c9b2bbb14e07.mp3"}, {"front": "Their mouth", "back": "το στόμα τους", "audio": "hypertts-a4749245c877f83f311ab2900629b24c0100b51b6932bc7b87e7b26e.mp3"}, {"front": "Her mouth", "back": "το στόμα της", "audio": "hypertts-61d7dcfe1b86c4449cb8ac9fd2e182ee8fc0e9d2583b2b9f06b91db4.mp3"}, {"front": "I can", "back": "μπορώ", "audio": "hypertts-88437654e2d6a9c5c8a4ac150b4890379f9df984a14d35e80f7c5c36.mp3"}, {"front": "I can't", "back": "δεν μπορώ", "audio": "hypertts-8a3af2c31e8737ddf0018c0a213c22cc0fbc3defd528a38872b94e67.mp3"}, {"front": "It hurts", "back": "πονάει", "audio": "hypertts-57d83fcd65eee600802c9d818877ce9112819af8aadad46f95366a9a.mp3"}, {"front": "Tonight", "back": "απόψε", "audio": "hypertts-2c021120b531f2dd19184582e7f52d0f3bbcbfa660e915679ef36a85.mp3"}, {"front": "He can't dance tonight because his stomach hurts", "back": "δεν μπορεί να χορέψει απόψε γιατί πονάει το στομάχι του", "audio": "hypertts-380d2bf5807874730107d62eaf9729923b278ec265d1798fad4dc9e8.mp3"}, {"front": "Alone", "back": "μόνος", "audio": "hypertts-672af429771a368d6cb1f1c6daf9589607fb54b50a70a6f639dc58f8.mp3"}, {"front": "One way street", "back": "Μονόδρομος", "audio": "hypertts-4100cd9a0a234505e9e9623a2c2a65a43e4aa5962205d051a4e76cd0.mp3"}, {"front": "I stay alone (men)", "back": "Μένω μόνος", "audio": "hypertts-e3baf931ea4d2ba24b52d8bf68f8598db95706687aad460947974399.mp3"}, {"front": "I stay alone (females)", "back": "Μένω μόνη", "audio": "hypertts-3f6aec90b000f2e1cf672a823fe73367a4547a8c3a86acf1d129ef13.mp3"}, {"front": "I stay alone by myself (men)", "back": "Μένω μόνος μου", "audio": "hypertts-0d112fe18e614e65fa9e9a476e3aa2e51e6a0caff020e340965ff700.mp3"}, {"front": "I stay alone by myself (females)", "back": "Μένω μόνη μου", "audio": "hypertts-687bd6dfe4982d6ed86a66d70a3837cb02112bceadc66f0dc96e3254.mp3"}, {"front": "Do you stay alone by yourself? (female)", "back": "Μένεις μόνη σου;", "audio": "hypertts-b8e5e0d7b95ba21114ad53cf664c1041a35e2cfbb2ab21b89c1f6127.mp3"}, {"front": "Do you stay alone by yourself? (man)", "back": "Μένεις μόνος σου;", "audio": "hypertts-171169888e3126d0a7c71aa7f2f48e30341455edcf22032d8d6a7ffa.mp3"}, {"front": "We want to stay by ourselves (men or mixed)", "back": "θέλουμε να μείνουμε μόνοι μας", "audio": "hypertts-4cdc0f47c402963957e47eb99cc232c8d3d4e60b517b9ce7bb7dc7d1.mp3"}, {"front": "We want to stay by ourselves (females)", "back": "θέλουμε να μείνουμε μόνες μας", "audio": "hypertts-8c80dbb54bc870e4153e6bc5bbfc25a6f952ccc7b7692fbb5952336e.mp3"}, {"front": "I can't cook by myself (specific - closed)", "back": "δεν μπορώ να μαγειρέψω μόνος μου", "audio": "hypertts-22321626bbd6b40ebe23234c3ce5a129a0aa2124efecbfbf31cb629e.mp3"}, {"front": "I can't cook by myself (general - open)", "back": "δεν μπορώ να μαγειρεύω μόνος μου", "audio": "hypertts-555c1257af2fb704eb221c1b1b4d7a23d59a19573bdfa7e2391ae036.mp3"}, {"front": "We can't cook by ourselves (masc. or mixed - open)", "back": "δεν μπορούμε να μαγειρεύουμε μόνοι μας", "audio": "hypertts-df2c8e0d7f33a9d49dbba05bf1fcd0024e81b0d5dd41ef386f35f01e.mp3"}, {"front": "We can't cook by ourselves (females)", "back": "δεν μπορούμε να μαγειρεύουμε μόνες μας", "audio": "hypertts-3eb6de854f579376985b8582c27de8f9f6dea76fcb9cdb54bf8f394d.mp3"}, {"front": "He can't cook by himself", "back": "δεν μπορεί να μαγειρέψει μόνος του", "audio": "hypertts-1c567dd5636bc9c89da7e778e9d48d520025586b7b01fed13e436654.mp3"}, {"front": "They can't cook by themselves (masc.)", "back": "δεν μπορούν να μαγειρέψουν μόνοι τους", "audio": "hypertts-d386f6338b83a7268afc9852c94f960a109b559edd024585b1975410.mp3"}, {"front": "They can't cook by themselves (females)", "back": "δεν μπορούν να μαγειρέψουν μόνες τους", "audio": "hypertts-2a0486e3b074aa967367804fd28cbe0057bb6867d3176a9f4f463278.mp3"}, {"front": "I only want to see him", "back": "θέλω μόνο να τον δω", "audio": "hypertts-bcb4a7857fb0b40cf988a9e9dfd26289c68a984e7c7a6350c8645e0f.mp3"}, {"front": "I just sell them (neuter)", "back": "εγώ μόνο τα πουλάω", "audio": "hypertts-3a322ca445a7a9684b6f0c8621a279ee073c3197b626a276cc541a7b.mp3"}, {"front": "The only thing that I want", "back": "το μόνο (πράγμα) που θέλω", "audio": "hypertts-93048d0d0bb9b3cb05c16434759ca6205f92fb48b8ccee6dd28a1a95.mp3"}, {"front": "The only thing we want is to stay by ourselves", "back": "το μόνο που θέλουμε είναι να μείνουμε μόνοι μας", "audio": "hypertts-430d8eaf43beb38c81d3eab375e7937f2dd92792548fe279da446521.mp3"}];
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
let deck=shuffle(CARDS);let pos=0;let currentAudio=null;
function updateProgress(){
  document.getElementById('current-num').textContent=pos+1;
  document.getElementById('total-num').textContent=deck.length;
  document.getElementById('prog').style.width=Math.round(((pos+1)/deck.length)*100)+'%';
  document.getElementById('prev-btn').disabled=pos===0;
}
function showCard(){
  const card=deck[pos];
  document.getElementById('card-inner').classList.remove('flipped');
  document.getElementById('eng-text').textContent=card.front;
  document.getElementById('greek-text').textContent=card.back;
  document.getElementById('audio-btn').classList.remove('playing');
  document.getElementById('tap-hint').style.display='';
  if(currentAudio){currentAudio.pause();currentAudio=null;}
  updateProgress();
}
function flipCard(){
  const flipped=document.getElementById('card-inner').classList.toggle('flipped');
  if(flipped){document.getElementById('tap-hint').style.display='none';playAudio();}
  else{document.getElementById('tap-hint').style.display='';}
}
function playAudio(){
  const card=deck[pos];
  if(currentAudio){currentAudio.pause();currentAudio=null;}
  const btn=document.getElementById('audio-btn');
  const audio=new Audio(AUDIO_PATH+card.audio);
  currentAudio=audio;btn.classList.add('playing');
  audio.play().catch(()=>{});
  audio.onended=()=>{btn.classList.remove('playing');currentAudio=null;};
  audio.onerror=()=>{btn.classList.remove('playing');currentAudio=null;};
}
function nextCard(){if(pos<deck.length-1){pos++;showCard();}else{showDone();}}
function prevCard(){if(pos>0){pos--;showCard();}}
function showDone(){
  document.getElementById('study-view').classList.add('hidden');
  document.getElementById('done-view').classList.remove('hidden');
}
function restart(){
  deck=shuffle(CARDS);pos=0;
  document.getElementById('done-view').classList.add('hidden');
  document.getElementById('study-view').classList.remove('hidden');
  showCard();
}
showCard();
</script>
</body>
</html>
