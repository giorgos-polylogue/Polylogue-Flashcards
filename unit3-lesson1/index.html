<head>

<title>Polylogue — Lesson 1: Lost, Forgotten — Closed Forms</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f4f0; min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 2rem 1rem; color: #1a1a1a; }

  .card-face { backface-visibility: hidden; -webkit-backface-visibility: hidden; background: #fff; border: 1px solid #e5e5e5; border-radius: 16px; padding: 2.5rem 2rem; min-height: 200px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; }

  .nav-btn { padding: 14px 4px; border-radius: 10px; border: 1px solid #e5e5e5; background: #fff; cursor: pointer; font-size: 14px; font-weight: 500; font-family: inherit; color: #1a1a1a; transition: background 0.15s, opacity 0.15s; display: flex; align-items: center; justify-content: center; gap: 6px; }
  .nav-btn:hover:not(:disabled) { background: #f5f4f0; }
  .nav-btn.primary { background: #1D9E75; color: #fff; border-color: #1D9E75; }

<script>
const AUDIO_PATH='audio/';

: "They haven't lost it", "back": "δεν το έχουν χάσει", "audio": "hypertts-336e44295853b76d2fd32edbab1aa5dd7579cb8a50862697ab5625f1.mp3"}, {"front": "I forget", "back": "ξεχνάω", "audio": "hypertts-e79cdd55e96521164422d50111c36cdae3a112a8ca0faccbeceb6c6a.mp3"}, {"front": "She is forgetting / she forgets", "back": "ξεχνάει", "audio": "hypertts-f6b619e79b4e8d36c496eb1f7c82ec736984c48a79b2a6fdcf30a0e8.mp3"}, {"front": "She is forgetting me", "back": "με ξεχνάει", "audio": "hypertts-d0d747072cf7c0c4a28a75ceb5d5d3c713eba25405e9e8fb39d6e553.mp3"}, {"front": "She is forgetting him", "back": "τον ξεχνάει", "audio": "hypertts-914f7214772a05be77e578fb94a0f97ebd47312c3f8d4274069d2b75.mp3"}, {"front": "She is forgetting her", "back": "την ξεχνάει", "audio": "hypertts-3190f75465844de0c1923bb4e4a02535f22c97419b64ebb208d4b44f.mp3"}, {"front": "I have forgotten", "back": "έχω ξεχάσει", "audio": "hypertts-3bd3c6df196e60a0277f98e40da907b1d2ba9e1859d88f2c2b3b6586.mp3"}, {"front": "I haven't forgotten", "back": "δεν έχω ξεχάσει", "audio": "hypertts-f83f748b6bd931ddc5bf7c0bdc07a0c866ac3c4be320f75524219961.mp3"}, {"front": "I haven't forgotten him", "back": "δεν τον έχω ξεχάσει", "audio": "hypertts-ca83c3cc1c5a98ec157c5d378a26695c7529cd00aa61c9845df8a5c3.mp3"}, {"front": "I haven't forgotten her", "back": "δεν την έχω ξεχάσει", "audio": "hypertts-cab800d1336c32908c04f53b2a7b7583f8b419a352c43e893638c40f.mp3"}, {"front": "He hasn't forgotten her", "back": "αυτός δεν την έχει ξεχάσει", "audio": "hypertts-ee4f8be5b0701d7256828731feac7026f222be5df536f5cb65f1420a.mp3"}, {"front": "The shop", "back": "Το μαγαζί", "audio": "hypertts-e1b031352c0aadcbc043c41d7331c264174369ec2852b3ee65d97774.mp3"}, {"front": "The shops", "back": "Τα μαγαζιά", "audio": "hypertts-cb0f871b3cfb4e77622d352ef0eaa5d821c2a62d47edfd59ffb029ca.mp3"}, {"front": "I close / I am closing", "back": "Κλείνω", "audio": "hypertts-4eb540486e606b09974f2101f6aaa55cd9e06d078ee3fc9e56d88aa1.mp3"}, {"front": "The shops have closed", "back": "τα μαγαζιά έχουν κλείσει", "audio": "hypertts-d1e45ddee6f4c2a1cce8fad5e9ea6cfb496b55693b2f0f6fc6bf926b.mp3"}, {"front": "The shops will have closed", "back": "τα μαγαζιά θα έχουν κλείσει", "audio": "hypertts-b82f6d821bdd28b33317d8cb58bea00936b658c7d2fc799b1f80a827.mp3"}, {"front": "There is", "back": "υπάρχει", "audio": "hypertts-e59829b26ba361a01a9aded1f6edbc0312ef2442c2c4261685a28e65.mp3"}, {"front": "There are / they exist", "back": "υπάρχουν", "audio": "hypertts-f648f96751dce2e3dd45bb33465ed04cac2a7966fe5f9af835e4d697.mp3"}, {"front": "There are two", "back": "υπάρχουν δύο", "audio": "hypertts-38ee506e2a7176bc7efb1dc3dc0ff92f296408b14bf9c429d0a7e301.mp3"}, {"front": "There is one (neuter)", "back": "υπάρχει ένα", "audio": "hypertts-32b9d5bae667f0496cb765e28a7fc23762699952ab8ce62f5322421f.mp3"}, {"front": "There is one (masc.)", "back": "υπάρχει ένας", "audio": "hypertts-e2331af35d3520e728dbdd59805026c8dc6bba4a39bf729b7f02728e.mp3"}, {"front": "There is one (fem.)", "back": "υπάρχει μία", "audio": "hypertts-33e28038dc5e860dc3a9527fae0a240853be31f3c2c025b9c1d8b996.mp3"}, {"front": "I have started", "back": "έχω αρχίσει", "audio": "hypertts-219e4dbff5735ba1f7a1559d676137b650866ccfc96230316aa6032f.mp3"}, {"front": "The movie has started", "back": "η ταινία έχει αρχίσει", "audio": "hypertts-da7320152dab81d6821ccc5c921ca8cf018265e81a0b2525ba8e7e0e.mp3"}, {"front": "The movies", "back": "οι ταινίες", "audio": "hypertts-c9ca60587d1baafdfa10817f5f61f947f06f995c788339a4580c7130.mp3"}, {"front": "The movies have started", "back": "οι ταινίες έχουν αρχίσει", "audio": "hypertts-86717ba12fa886f23494447f9ccd0a6391e734af50299fd7f9043da1.mp3"}, {"front": "I finish / I am finishing", "back": "Τελειώνω", "audio": "hypertts-cd063ce5f1abd5e369836d0ae1bf098148b4044e57c169a476ebb4e3.mp3"}, {"front": "The movie has finished", "back": "η ταινία έχει τελειώσει", "audio": "hypertts-24e60fd0452baa1a0231e38059f3d546224c8c79d5489d58e05b0204.mp3"}, {"front": "The movies have finished", "back": "οι ταινίες έχουν τελειώσει", "audio": "hypertts-83b4fdb167475d0ac0e3296716d3ebe6b76df48fc066ee031fd488fe.mp3"}, {"front": "We will see", "back": "θα δούμε", "audio": "hypertts-a6491b1dac1ced586a7a74f671a273e91793e4c90a76c4985b9a6df7.mp3"}, {"front": "I don't want them to see me", "back": "δεν θέλω να με δούνε", "audio": "hypertts-0454bf9b30f4b7afc714b7743755355a688acdb95501c1a8155ca24a.mp3"}, {"front": "Have you seen it? (neuter)", "back": "το έχεις δει;", "audio": "hypertts-716ffb828b01e2769a28ea90d163d22e48c7986c39936dba5c0cbdc4.mp3"}, {"front": "Have you seen them? (neuter)", "back": "τα έχεις δει;", "audio": "hypertts-491f0e43527dfb8471492ed43c919de19c2bbe82a01e26ab829ab28f.mp3"}, {"front": "Have you seen him?", "back": "τον έχεις δει;", "audio": "hypertts-0b7139c7cc2b6e2f1fc2c15209ffdb87d2ae34e5a637865442929613.mp3"}, {"front": "Have you seen her?", "back": "την έχεις δει;", "audio": "hypertts-332d4df5e7afb6728f9a24a14cc194f311fed2de8138b2dfa6bb528d.mp3"}, {"front": "Have you seen it? (the movie)", "back": "την έχεις δει;", "audio": "hypertts-332d4df5e7afb6728f9a24a14cc194f311fed2de8138b2dfa6bb528d.mp3"}];
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
let deck=shuffle(CARDS);let pos=0;let currentAudio=null;
function updateProgress(){
  document.getElementById('current-num').textContent=pos+1;
  document.getElementById('total-num').textContent=deck.length;
  document.getElementById('prog').style.width=Math.round(((pos+1)/deck.length)*100)+'%';
  document.getElementById('prev-btn').disabled=pos===0;
}
function showCard(){
  const card=deck[pos];
  document.getElementById('card-inner').classList.remove('flipped');
  document.getElementById('eng-text').textContent=card.front;
  document.getElementById('greek-text').textContent=card.back;
  document.getElementById('audio-btn').classList.remove('playing');
  document.getElementById('tap-hint').style.display='';
  if(currentAudio){currentAudio.pause();currentAudio=null;}
  updateProgress();
}
function flipCard(){
  const flipped=document.getElementById('card-inner').classList.toggle('flipped');
  if(flipped){document.getElementById('tap-hint').style.display='none';playAudio();}
  else{document.getElementById('tap-hint').style.display='';}
}
function playAudio(){
  const card=deck[pos];
  if(currentAudio){currentAudio.pause();currentAudio=null;}
  const btn=document.getElementById('audio-btn');
  const audio=new Audio(AUDIO_PATH+card.audio);
  currentAudio=audio;btn.classList.add('playing');
  audio.play().catch(()=>{});
  audio.onended=()=>{btn.classList.remove('playing');currentAudio=null;};
  audio.onerror=()=>{btn.classList.remove('playing');currentAudio=null;};
}
function nextCard(){if(pos<deck.length-1){pos++;showCard();}else{showDone();}}
function prevCard(){if(pos>0){pos--;showCard();}}
function showDone(){
  document.getElementById('study-view').classList.add('hidden');
  document.getElementById('done-view').classList.remove('hidden');
}
function restart(){
  deck=shuffle(CARDS);pos=0;
  document.getElementById('done-view').classList.add('hidden');
  document.getElementById('study-view').classList.remove('hidden');
  showCard();
}
showCard();
</script>
</body>
</html>
