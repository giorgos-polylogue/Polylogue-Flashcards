const CARDS=[{"front": "I liked it", "back": "μου άρεσε", "audio": "hypertts-ccfd75eb130235e83b2ff880af73d2d14b581232a364281d046ae8df.mp3"}, {"front": "I like it", "back": "μου αρέσει", "audio": "hypertts-44ac392d1d6e0838d1070711f486de588cb02bce04eae3bf9c07299f.mp3"}, {"front": "You liked him/her/it", "back": "σου άρεσε", "audio": "hypertts-4e9d2f61cd265e1e134382fa6ca25de6c8fe5ff3d65cb7068f2cb89f.mp3"}, {"front": "Didn't you like it?", "back": "δεν σου άρεσε;", "audio": "hypertts-8cd5b4228b694bc9acae25d48398ddc4c352108cde9bc30badb2ec8d.mp3"}, {"front": "I didn't like it", "back": "δεν μου άρεσε", "audio": "hypertts-5545c42a6c4bb2a8a1526bc5e125f1bd4787a70a010b75095d678d7b.mp3"}, {"front": "He/she/it waited", "back": "περίμενε", "audio": "hypertts-1a295a48c988e46fb65bdf352841145499ef3b55abdfc1248d498b44.mp3"}, {"front": "He/she/it didn't wait", "back": "δεν περίμενε", "audio": "hypertts-ac0a0aa338df30d936f1687eb26c0abb34c02e4ef7c8f11d540e9185.mp3"}, {"front": "He didn't wait for me", "back": "δεν με περίμενε", "audio": "hypertts-a12bf822c3e56d792df857f87108c0ff1ff39c2c12ff1689776b8442.mp3"}, {"front": "He/she didn't wait for you", "back": "δεν σε περίμενε", "audio": "hypertts-f5fbae53c128c7e32a22c050a9e49a465d41406789518edc0e88ccb0.mp3"}, {"front": "Did you wait? / Were you waiting?", "back": "περίμενες;", "audio": "hypertts-89f098246fb562799b229679f621a1c156dc64beb44253d41741b746.mp3"}, {"front": "Were you waiting for me?", "back": "με περίμενες;", "audio": "hypertts-2b11e013c77d65c41e400b2fd5d8dfc101cd4cc21c17e81bd19fdc35.mp3"}, {"front": "Were you waiting for me outside?", "back": "με περίμενες έξω;", "audio": "hypertts-4fedcf0bc6d5e6a4fdcf8d112832f5838022929ee1a95e969b3aebca.mp3"}, {"front": "Were you waiting for him?", "back": "τον περίμενες;", "audio": "hypertts-dff2d72f61908bdec13de05396427af79f95464e56791902559f6197.mp3"}, {"front": "Weren't you waiting for him?", "back": "δεν τον περίμενες;", "audio": "hypertts-571bc319247ba4a530e8941087bc83e249d01d5e93cdae2d : "He was waiting at the exit with your friend (masc.)", "back": "περίμενε στην έξοδο με τον φίλο σου", "audio": "hypertts-e0f3fefd0e6f6df6ca45421610f7e86098e5c9f47e9c1963ace1ea09.mp3"}, {"front": "I was waiting", "back": "περίμενα", "audio": "hypertts-267ee305a9ceda99b8623371cd3baad86a1d028ce170b53b653477ef.mp3"}, {"front": "I was waiting outside", "back": "περίμενα έξω", "audio": "hypertts-5d8c12fa8f2120781d109f34ba6cd5e6f03687fcadafa46b823c7323.mp3"}, {"front": "I was waiting at the exit", "back": "περίμενα στην έξοδο", "audio": "hypertts-ecd1bb286cebe6c906be47ba4a0b21706a37d5845b39e121a5306287.mp3"}, {"front": "They were waiting", "back": "περίμεναν", "audio": "hypertts-8253ba1974f94a81f8f944256dead544ba20ee82ac14b17f83df4a4e.mp3"}, {"front": "They didn't wait for me", "back": "δεν με περίμεναν", "audio": "hypertts-4288c5e31fb9ce4c5d26a531ae7d816247f46c669b922994b39edea1.mp3"}, {"front": "The entrance", "back": "η είσοδος", "audio": "hypertts-65a1fff2d609ff2b8acd980b14d4d69bbdebcf805ba5b387676d6bc6.mp3"}, {"front": "They waited for me at the entrance", "back": "με περίμεναν στην είσοδο", "audio": "hypertts-04b218978f9de077bd82e78f823fced430f2b5b23e44ddc4949f0064.mp3"}, {"front": "I didn't like them", "back": "δεν μου άρεσαν", "audio": "hypertts-345c4a2becb757d607db2dc81e530adce680b0fe54d82a82d13cbd22.mp3"}, {"front": "We waited / we were waiting", "back": "περιμέναμε", "audio": "hypertts-5c998656a755eda750617b9dedbe6caf7e27608f48b862b819c23c17.mp3"}, {"front": "We didn't wait", "back": "δεν περιμέναμε", "audio": "hypertts-7d87eb225bbcedd107875c0f23d57e2e04e5d2fe5505ba29a326f78c.mp3"}, {"front": "She didn't like us", "back": "δεν της αρέσαμε", "audio": "hypertts-486fc8a827ac9f06a6a31063c794e9d2ab31f004f5a1c07149d630bb.mp3"}, {"front": "She doesn't like us", "back": "δεν της αρέσουμε", "audio": "hypertts-689f99f625e64046ece5128d21e380e7b22311eeb0f0ce9aec21d777.mp3"}, {"front": "She liked it", "back": "της άρεσε", "audio": "hypertts-19b2d6316ac4f40a8bef3f558b45f70d0b16831fcfab6a67b74c8ff6.mp3"}, {"front": "She liked you", "back": "της άρεσες", "audio": "hypertts-0abe8a6a3b57a56876e76cf9bcc008452dc5c9978f65451aff3d02cd.mp3"}, {"front": "I was buying", "back": "αγόραζα", "audio": "hypertts-83a987ed92cd2f4bfa0cf43c472b5d1c4680a69d735a70a5b83332dd.mp3"}, {"front": "I bought", "back": "αγόρασα", "audio": "hypertts-1867c29e9dc6c53aa0014925bcd110459371f9201c8827b710bb0508.mp3"}, {"front": "I bought it", "back": "το αγόρασα", "audio": "hypertts-603ee283bf3fd1a4a3aad6aaa52d1f574380d6399605a071bd3d71f3.mp3"}, {"front": "I bought you it", "back": "σου το αγόρασα", "audio": "hypertts-c188a651373e973e2659cd1481d4dff0c61545d5e933d111fe8de563.mp3"}, {"front": "We bought you it", "back": "σου το αγοράσαμε", "audio": "hypertts-3244a382651e8c9215f682d6a2a8ae387434d6d18fa6e3547d8ce8b9.mp3"}, {"front": "They bought us it", "back": "μας το αγόρασαν", "audio": "hypertts-5481835a9df3bace002a81584623c5b170decb9619f0c7b79d11aa9e.mp3"}, {"front": "They were buying it for us", "back": "μας το αγόραζαν", "audio": "hypertts-2c8cf08ed525b90fda9439e05be15dffd7251149f022646cb01697d9.mp3"}, {"front": "She bought it", "back": "το αγόρασε", "audio": "hypertts-896d06e86a2cfe516abc19b1d00be90a4b1068e109d963daed1415f7.mp3"}, {"front": "Did you buy it?", "back": "το αγόρασες;", "audio": "hypertts-075ac87e9fc05d20d79fdb8e08726a7ec853329a877b9b534717abed.mp3"}, {"front": "Where did you buy it?", "back": "που το αγόρασες;", "audio": "hypertts-ac4657bfbd5ad991b98aefe78bce55cd52e8736fcbb7f1e13a419c15.mp3"}, {"front": "What did you buy there?", "back": "τι αγόρασες εκεί;", "audio": "hypertts-1a27c8c765ced8b06d06d8499f6eb4f28992c839c4b6b594325af5d3.mp3"}, {"front": "Did you buy something for your friend? (female)", "back": "αγόρασες κάτι για την φίλη σου;", "audio": "hypertts-6354e09c11ca1f087a78f76df80e711054d67f6bd9a2808e319af9a7.mp3"}];
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
let deck=shuffle(CARDS);let pos=0;let currentAudio=null;
function updateProgress(){
  document.getElementById('current-num').textContent=pos+1;
  document.getElementById('total-num').textContent=deck.length;
  document.getElementById('prog').style.width=Math.round(((pos+1)/deck.length)*100)+'%';
  document.getElementById('prev-btn').disabled=pos===0;
}
function showCard(){
  const card=deck[pos];
  document.getElementById('card-inner').classList.remove('flipped');
  document.getElementById('eng-text').textContent=card.front;
  document.getElementById('greek-text').textContent=card.back;
  document.getElementById('audio-btn').classList.remove('playing');
  document.getElementById('tap-hint').style.display='';
  if(currentAudio){currentAudio.pause();currentAudio=null;}
  updateProgress();
}
function flipCard(){
  const flipped=document.getElementById('card-inner').classList.toggle('flipped');
  if(flipped){document.getElementById('tap-hint').style.display='none';playAudio();}
  else{document.getElementById('tap-hint').style.display='';}
}
function playAudio(){
  const card=deck[pos];
  if(currentAudio){currentAudio.pause();currentAudio=null;}
  const btn=document.getElementById('audio-btn');
  const audio=new Audio(AUDIO_PATH+card.audio);
  currentAudio=audio;btn.classList.add('playing');
  audio.play().catch(()=>{});
  audio.onended=()=>{btn.classList.remove('playing');currentAudio=null;};
  audio.onerror=()=>{btn.classList.remove('playing');currentAudio=null;};
}
function nextCard(){if(pos<deck.length-1){pos++;showCard();}else{showDone();}}
function prevCard(){if(pos>0){pos--;showCard();}}
function showDone(){
  document.getElementById('study-view').classList.add('hidden');
  document.getElementById('done-view').classList.remove('hidden');
}
function restart(){
  deck=shuffle(CARDS);pos=0;
  document.getElementById('done-view').classList.add('hidden');
  document.getElementById('study-view').classList.remove('hidden');
  showCard();
}
showCard();
</script>
</body>
