<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Polylogue — Lesson 1: Using το to say "it"</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f4f0; min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 2rem 1rem; color: #1a1a1a; }
  #app { width: 100%; max-width: 520px; }
  header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; }
  .back-link { font-size: 13px; color: #888; text-decoration: none; display: flex; align-items: center; gap: 5px; }
  .back-link:hover { color: #1a1a1a; }
  .deck-tag { font-size: 12px; color: #888; background: #fff; border: 1px solid #e5e5e5; padding: 4px 12px; border-radius: 99px; }
  .progress-bar { height: 3px; background: #e5e5e5; border-radius: 99px; overflow: hidden; margin-bottom: 1.25rem; }
  .progress-fill { height: 100%; background: #1D9E75; border-radius: 99px; transition: width 0.4s ease; width: 0%; }
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 1.5rem; }
  .stat { background: #fff; border: 1px solid #e5e5e5; border-radius: 10px; padding: 12px; text-align: center; }
  .stat-num { font-size: 22px; font-weight: 600; color: #1a1a1a; }
  .stat-label { font-size: 11px; color: #999; margin-top: 2px; text-transform: uppercase; letter-spacing: 0.04em; }
  .card-scene { perspective: 1200px; margin-bottom: 1rem; cursor: pointer; user-select: none; }
  .card-inner { position: relative; width: 100%; transform-style: preserve-3d; transition: transform 0.45s cubic-bezier(0.4,0,0.2,1); }
  .card-inner.flipped { transform: rotateY(180deg); }
  .card-face { backface-visibility: hidden; -webkit-backface-visibility: hidden; background: #fff; border: 1px solid #e5e5e5; border-radius: 16px; padding: 2.5rem 2rem; min-height: 200px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; }
  .card-back { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: rotateY(180deg); }
  .card-label { font-size: 11px; color: #bbb; letter-spacing: 0.08em; text-transform: uppercase; }
  .card-text { font-size: 24px; font-weight: 500; color: #1a1a1a; text-align: center; line-height: 1.35; }
  .card-text.greek { font-size: 26px; }
  .audio-btn { display: flex; align-items: center; gap: 7px; padding: 7px 16px; border: 1px solid #e0e0e0; border-radius: 99px; background: transparent; color: #888; font-size: 13px; cursor: pointer; transition: background 0.15s; font-family: inherit; }
  .audio-btn:hover { background: #f5f4f0; color: #555; }
  .audio-btn.playing { color: #1D9E75; border-color: #1D9E75; }
  .tap-hint { text-align: center; font-size: 13px; color: #bbb; margin-bottom: 1rem; height: 20px; }
  .rating-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 1.5rem; }
  .rating-btn { padding: 12px 4px; border-radius: 10px; border: 1px solid #e5e5e5; background: #fff; cursor: pointer; font-size: 13px; font-weight: 500; font-family: inherit; display: flex; flex-direction: column; align-items: center; gap: 4px; transition: background 0.15s; }
  .rating-btn:hover { background: #f5f4f0; }
  .rating-btn .icon { font-size: 16px; }
  .rating-btn .rlabel { font-size: 10px; color: #aaa; font-weight: 400; }
  .r-again .icon { color: #C0392B; } .r-hard .icon { color: #E67E22; } .r-good .icon { color: #2980B9; } .r-easy .icon { color: #1D9E75; }
  .hidden { display: none !important; }
  .done-screen { background: #fff; border: 1px solid #e5e5e5; border-radius: 16px; padding: 2.5rem 2rem; text-align: center; }
  .done-title { font-size: 22px; font-weight: 600; color: #1a1a1a; margin-bottom: 8px; }
  .done-sub { font-size: 14px; color: #888; margin-bottom: 1.5rem; }
  .done-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 1.5rem; }
  .btn-row { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
  .action-btn { padding: 11px 28px; border: 1px solid #e0e0e0; border-radius: 10px; background: transparent; color: #1a1a1a; font-size: 14px; font-family: inherit; cursor: pointer; transition: background 0.15s; text-decoration: none; display: inline-block; }
  .action-btn:hover { background: #f5f4f0; }
  @media (max-width: 400px) { .card-text { font-size: 18px; } .card-text.greek { font-size: 20px; } .card-face { padding: 2rem 1.25rem; min-height: 170px; } }
</style>
</head>
<body>
<div id="app">
  <header>
    <a href="/" class="back-link">
      <svg width="14" height="14" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 2L4 6l4 4"/></svg>
      All lessons
    </a>
    <span class="deck-tag">Unit 2 · Lesson 1</span>
  </header>

  <div id="study-view">
    <div class="progress-bar"><div class="progress-fill" id="prog"></div></div>
    <div class="stats">
      <div class="stat"><div class="stat-num" id="s-due">0</div><div class="stat-label">Due</div></div>
      <div class="stat"><div class="stat-num" id="s-good">0</div><div class="stat-label">Good</div></div>
      <div class="stat"><div class="stat-num" id="s-again">0</div><div class="stat-label">Again</div></div>
    </div>
    <div class="card-scene" onclick="flipCard()">
      <div class="card-inner" id="card-inner">
        <div class="card-face">
          <span class="card-label">English</span>
          <div class="card-text" id="eng-text">—</div>
        </div>
        <div class="card-face card-back">
          <span class="card-label">Greek</span>
          <div class="card-text greek" id="greek-text">—</div>
          <button class="audio-btn" id="audio-btn" onclick="event.stopPropagation(); playAudio()">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M3 6H1v4h2l4 3V3L3 6zM11.5 8c0-1.5-.8-2.8-2-3.5v7c1.2-.7 2-2 2-3.5zM14 8c0-2.8-1.6-5.2-4-6.3v1.1C11.8 3.7 13 5.7 13 8s-1.2 4.3-3 5.2v1.1C12.4 13.2 14 10.8 14 8z"/></svg>
            Listen
          </button>
        </div>
      </div>
    </div>
    <p class="tap-hint" id="tap-hint">Tap to reveal the Greek</p>
    <div class="rating-row hidden" id="rating-row">
      <button class="rating-btn r-again" onclick="rate(0)"><span class="icon">✕</span><span class="rlabel">Again</span></button>
      <button class="rating-btn r-hard" onclick="rate(1)"><span class="icon">~</span><span class="rlabel">Hard</span></button>
      <button class="rating-btn r-good" onclick="rate(2)"><span class="icon">✓</span><span class="rlabel">Good</span></button>
      <button class="rating-btn r-easy" onclick="rate(3)"><span class="icon">✓✓</span><span class="rlabel">Easy</span></button>
    </div>
  </div>

  <div id="done-view" class="done-screen hidden">
    <div class="done-title">Session complete</div>
    <div class="done-sub" id="done-msg"></div>
    <div class="done-stats">
      <div class="stat"><div class="stat-num" id="d-good">0</div><div class="stat-label">Good</div></div>
      <div class="stat"><div class="stat-num" id="d-again">0</div><div class="stat-label">Again</div></div>
      <div class="stat"><div class="stat-num" id="d-total">0</div><div class="stat-label">Total</div></div>
    </div>
    <div class="btn-row">
      <button class="action-btn" onclick="restartAll()">Study again</button>
      <a href="/" class="action-btn">All lessons</a>
    </div>
  </div>
</div>
<script>
const AUDIO_PATH = 'audio/';
const STORAGE_KEY = 'polylogue_u2l1_v2';
const CARDS = [{"front": "I stay / I am staying", "back": "Μένω", "audio": "hypertts-2343114cc5562cdac4b493d8f2b8f2252cd702979583de3fbfddacfc.mp3"}, {"front": "I wait / I am waiting", "back": "Περιμένω", "audio": "hypertts-fe272818260999520aaca334801a748e3d3304a904758530a138baac.mp3"}, {"front": "I know", "back": "Ξέρω", "audio": "hypertts-6604372f663e78d239eff5099dbc6aa6dea35585e2e58dc39e2d2101.mp3"}, {"front": "I want", "back": "θέλω", "audio": "hypertts-d0d2be7c166c3eee649127cbc58d475cebc7c7739873ed1ec7df51c9.mp3"}, {"front": "He/she wants", "back": "θέλει", "audio": "hypertts-1b38c74184494ef148a4c7bf7061543b683916dc2bcd1179d0d36925.mp3"}, {"front": "You want", "back": "θέλεις", "audio": "hypertts-f859d89da57f31b0c699c008ba8c9a1b3a5c059aec9bc7c20e5a8a0e.mp3"}, {"front": "The mobile phone", "back": "Το κινητό", "audio": "hypertts-d9751ae971c1bb239c9868fbfe8ee8b2c03b8d1639639df56b8233e6.mp3"}, {"front": "I want the mobile phone", "back": "θέλω το κινητό", "audio": "hypertts-09f831d4c6e0c32101296d6f219809182d417e56c10b040cea08a953.mp3"}, {"front": "Don't you want the mobile?", "back": "δεν θέλεις το κινητό;", "audio": "hypertts-f4151e158be834eb4f1ee917284027d587be4c2da93676420c92409a.mp3"}, {"front": "I want it", "back": "το θέλω", "audio": "hypertts-b97db487226def73c4071c602d6b664f4850ae5ccde7cae0fed88ebb.mp3"}, {"front": "I don't want it", "back": "δεν το θέλω", "audio": "hypertts-bd3ba14c670010e175c62375b706ad077804c1873674d4ec08099c3a.mp3"}, {"front": "I am doing it / I am making it", "back": "το κάνω", "audio": "hypertts-85ee49db474f56732d703118ce91f3e4c15e2aa3c1b56db7e8bdfb83.mp3"}, {"front": "I want to do it / I want to make it", "back": "θέλω να το κάνω", "audio": "hypertts-6de5ab5dce3b17219fca5f07e90f14a5d248c349f71a0d776bf5c41c.mp3"}, {"front": "I want you to do it / I want you to make it", "back": "θέλω να το κάνεις", "audio": "hypertts-80cb52ee28127376ff71496d509f0598bb165151f51e38d166fa3060.mp3"}, {"front": "here", "back": "εδώ", "audio": "hypertts-b4c9bc154579ed7274404a1356ba7db95438dcfc4ef6bc04347d1272.mp3"}, {"front": "I don't want you to do it here", "back": "δεν θέλω να το κάνεις εδώ", "audio": "hypertts-b90439692c9760e40514b16d4aa310cc0ab36957430099ba22c28267.mp3"}, {"front": "I have the mobile phone", "back": "έχω το κινητό", "audio": "hypertts-2742064765cde41e269389ad9c6c21ceb0f794f26de4b49cf47555aa.mp3"}, {"front": "I have it", "back": "το έχω", "audio": "hypertts-1d2bd605af706e7361f2cbabdc95a821ddd28303628078dbfbe0dc0f.mp3"}, {"front": "I don't have it", "back": "δεν το έχω", "audio": "hypertts-d4023cf0b84be1a5c26f91c017a21a56e9520c461789eeedfbddab16.mp3"}, {"front": "He/she/it has", "back": "έχει", "audio": "hypertts-18c7c4f8a3fe2b6444a27f95a7ba34b4b973b3da797a69d7170d36fb.mp3"}, {"front": "You have", "back": "έχεις", "audio": "hypertts-b06fec82b3679a8ebb7f1333abf67052e48f9867ac767e42b4edd97a.mp3"}, {"front": "What do you have?", "back": "τι έχεις;", "audio": "hypertts-27920665ca465e9990c259b2d0044576b8656f57cc79f00454e2eb3d.mp3"}, {"front": "What does he have?", "back": "τι έχει;", "audio": "hypertts-699fd219d53ea718f29645c93065616d0146cbf4b09d1aeb185628e5.mp3"}, {"front": "The car", "back": "Το αυτοκίνητο", "audio": "hypertts-c74e42093c658116959694c2b0539c7f267d576518a89ad9dbe87615.mp3"}, {"front": "Do you have the car?", "back": "έχεις το αυτοκίνητο;", "audio": "hypertts-93f87added2e05d41d5cc5b6b7b5e6bdee9a235317e84ef6d7e2650d.mp3"}, {"front": "Do you have it?", "back": "το έχεις;", "audio": "hypertts-8114b70099be3b57ca8c97a3c97896b079c1a92834b74213f4aef891.mp3"}, {"front": "Don't you have it?", "back": "δεν το έχεις;", "audio": "hypertts-e13b7aeffb1c3da9e8895b3753fc4c1576a7b74c89e8697cbf4050fc.mp3"}, {"front": "He/she/it is", "back": "Είναι", "audio": "hypertts-d31fe567b190ec0850acd189f05e8dc457af40a96ad91d8da210aba2.mp3"}, {"front": "Where is it / he / she?", "back": "που είναι;", "audio": "hypertts-ea45ce7ec91b92da77077918e71adeee3a7b00880ab37dd7a4884336.mp3"}, {"front": "Where is the car?", "back": "που είναι το αυτοκίνητο;", "audio": "hypertts-b274739b59e7c8407cc8d320fb7f4eaa90bb1e6d59dbe1efd4c097e9.mp3"}, {"front": "I don't know where it is", "back": "δεν ξέρω που είναι", "audio": "hypertts-c479f001ccb3330344821a4ba6dcfaa3f9b9361de49a6646de39874f.mp3"}, {"front": "Do you know where the car is?", "back": "ξέρεις που είναι το αυτοκίνητο;", "audio": "hypertts-ee11f7a6241edad33b8572d21aecae988ec8a523d619fa5f990d8a29.mp3"}, {"front": "Don't you know where she is?", "back": "δεν ξέρεις που είναι;", "audio": "hypertts-82dce09aafcea817ffbeb506a316a9ae3a65c6c2c01a77296617f7e9.mp3"}];

// State structure:
// session: { queue: [...indices], goodCount, againCount } — the in-progress session
// deck: [...card sm2 data] — only updated when session completes

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return null;
}

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch(e) {}
}

function buildDeck() {
  return CARDS.map(c => ({...c, interval:1, ef:2.5, nextDue: 0, reps:0}));
}

function startNewSession(deck) {
  // Due = cards whose nextDue <= today (day number)
  const today = Math.floor(Date.now() / 86400000);
  const dueIndices = deck.map((c,i) => i).filter(i => deck[i].nextDue <= today);
  const shuffled = dueIndices.sort(() => Math.random() - 0.5);
  return { queue: shuffled, pos: 0, againQueue: [], goodCount: 0, againCount: 0 };
}

// Load or init
let state = loadState();
if (!state) {
  const deck = buildDeck();
  const session = startNewSession(deck);
  state = { deck, session };
  saveState();
} else if (!state.session || state.session.queue.length === 0 && state.session.againQueue.length === 0) {
  // Session was completed — start a new one
  state.session = startNewSession(state.deck);
  saveState();
}

let currentAudio = null;
let currentCardIndex = null;

function getNextIndex() {
  const s = state.session;
  // First work through again queue, then main queue
  if (s.againQueue && s.againQueue.length > 0) return s.againQueue[0];
  if (s.pos < s.queue.length) return s.queue[s.pos];
  return null;
}

function totalDue() {
  const s = state.session;
  const remaining = s.queue.length - s.pos;
  const again = s.againQueue ? s.againQueue.length : 0;
  return remaining + again;
}

function updateStats() {
  const due = totalDue();
  document.getElementById('s-due').textContent = due;
  document.getElementById('s-good').textContent = state.session.goodCount;
  document.getElementById('s-again').textContent = state.session.againCount;
  const total = state.session.queue.length;
  const done = state.session.pos;
  document.getElementById('prog').style.width = total > 0 ? Math.round((done / total) * 100) + '%' : '0%';
}

function showCard(idx) {
  currentCardIndex = idx;
  const card = state.deck[idx];
  document.getElementById('card-inner').classList.remove('flipped');
  document.getElementById('eng-text').textContent = card.front;
  document.getElementById('greek-text').textContent = card.back;
  document.getElementById('rating-row').classList.add('hidden');
  document.getElementById('tap-hint').style.display = '';
  document.getElementById('audio-btn').classList.remove('playing');
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  updateStats();
}

function flipCard() {
  if (currentCardIndex === null) return;
  const inner = document.getElementById('card-inner');
  const flipped = inner.classList.toggle('flipped');
  if (flipped) {
    document.getElementById('rating-row').classList.remove('hidden');
    document.getElementById('tap-hint').style.display = 'none';
    playAudio();
  }
}

function playAudio() {
  if (currentCardIndex === null) return;
  const card = state.deck[currentCardIndex];
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  const btn = document.getElementById('audio-btn');
  const audio = new Audio(AUDIO_PATH + card.audio);
  currentAudio = audio;
  btn.classList.add('playing');
  audio.play().catch(() => {});
  audio.onended = () => { btn.classList.remove('playing'); currentAudio = null; };
  audio.onerror = () => { btn.classList.remove('playing'); currentAudio = null; };
}

function sm2(card, q) {
  if (q < 3) {
    card.reps = 0; card.interval = 1;
  } else {
    if (card.reps === 0) card.interval = 1;
    else if (card.reps === 1) card.interval = 6;
    else card.interval = Math.round(card.interval * card.ef);
    card.reps += 1;
  }
  card.ef = Math.max(1.3, card.ef + 0.1 - (3 - q) * (0.08 + (3 - q) * 0.02));
  // Schedule for future days — but DON'T change nextDue until session ends
  return card;
}

function rate(q) {
  if (currentCardIndex === null) return;
  const s = state.session;
  const card = state.deck[currentCardIndex];

  if (q >= 3) {
    // Good/Easy: apply sm2 and schedule
    sm2(card, q);
    const today = Math.floor(Date.now() / 86400000);
    card.nextDue = today + card.interval;
    s.goodCount++;
    // Remove from again queue if it was there
    if (s.againQueue && s.againQueue[0] === currentCardIndex) {
      s.againQueue.shift();
    } else {
      s.pos++;
    }
  } else {
    // Again: put back in again queue
    s.againCount++;
    if (s.againQueue && s.againQueue[0] === currentCardIndex) {
      // Already in again queue — move to end
      s.againQueue.shift();
      s.againQueue.push(currentCardIndex);
    } else {
      s.pos++;
      if (!s.againQueue) s.againQueue = [];
      s.againQueue.push(currentCardIndex);
    }
  }

  saveState();

  const next = getNextIndex();
  if (next === null) {
    showDone();
  } else {
    showCard(next);
  }
}

function showDone() {
  document.getElementById('study-view').classList.add('hidden');
  document.getElementById('done-view').classList.remove('hidden');
  document.getElementById('d-good').textContent = state.session.goodCount;
  document.getElementById('d-again').textContent = state.session.againCount;
  document.getElementById('d-total').textContent = state.session.goodCount + state.session.againCount;
  // Mark session complete so next visit starts fresh session
  state.session.queue = [];
  state.session.pos = 0;
  state.session.againQueue = [];
  saveState();
  const today = Math.floor(Date.now() / 86400000);
  const dueCount = state.deck.filter(c => c.nextDue <= today).length;
  document.getElementById('done-msg').textContent = dueCount > 0
    ? dueCount + ' cards due — come back tomorrow!'
    : 'All caught up! Come back tomorrow.';
}

function restartAll() {
  state.deck = buildDeck();
  state.session = startNewSession(state.deck);
  saveState();
  document.getElementById('done-view').classList.add('hidden');
  document.getElementById('study-view').classList.remove('hidden');
  const next = getNextIndex();
  if (next !== null) showCard(next);
}

// Init
const first = getNextIndex();
if (first !== null) {
  showCard(first);
} else {
  showDone();
}
</script>
</body>
</html>
