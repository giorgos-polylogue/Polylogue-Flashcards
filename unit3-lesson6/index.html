<style>

  .nav-btn { padding: 14px 4px; border-radius: 10px; border: 1px solid #e5e5e5; background: #fff; cursor: pointer; font-size: 14px; font-weight: 500; font-family: inherit; color: #1a1a1a; transition: background 0.15s, opacity 0.15s; display: flex; align-items: center; justify-content: center; gap: 6px; }

<script>
const AUDIO_PATH='audio/';
const CARDS=[{"front": "We have to eat them (neuter)", "back": "πρέπει να τα φάμε", "audio": "hypertts-3ee2f029929a037053e75ca6cb0cdcfe1a1c6b0b9168eff31de4ed18.mp3"}, {"front": "We have to eat them (masc.)", "back": "πρέπει να τους φάμε", "audio": "hypertts-d479d674bfbc7c4a6ca653eb4484bea162a2f7509ca0168d8a820793.mp3"}, {"front": "We have to eat them (fem.)", "back": "πρέπει να τις φάμε", "audio": "hypertts-4f7c3f67ae3242facd4e9055e077f3e8281508d43c854ea3477440e6.mp3"}, {"front": "We have to eat them quickly because they will get cold", "back": "πρέπει να τους φάμε γρήγορα γιατί θα κρυώσουν", "audio": "hypertts-7a5ebf388197827d4dd8a1f7606eb75a57f765752f4a7a84c7cfd7a4.mp3"}, {"front": "I will stay", "back": "θα μείνω", "audio": "hypertts-2b4e2477fa38eb03f0e06e8ac75b48d0ee93c73e356a2fbbfacc0751.mp3"}, {"front": "Do you have somewhere to stay?", "back": "έχεις που να μείνεις;", "audio": "hypertts-f8bc79a91dd92f76148336cd03b91a864960824e030e513489aa158c.mp3"}, {"front": "Shall we stay here?", "back": "να μείνουμε εδώ;", "audio": "hypertts-aee33d8caabed95f7cf9d9cde55a4b34f44af5b2006586e0c5f81a0c.mp3"}, {"front": "Let's stay here", "back": "ας μείνουμε εδώ", "audio": "hypertts-30d2c0eadcfb9cd0479d57b2c8d582da82bba2d12647a45d1b06f9e0.mp3"}, {"front": "I send", "back": "Στέλνω", "audio": "hypertts-b303d392c198dcef1573a0a433c5af933995c55f227bb6f29a49eabb.mp3"}, {"front": "I will send him it tomorrow", "back": "θα του το στείλω αύριο", "audio": "hypertts-edd7115111ee3776456f23918d08d7940f7529c7d6ed180a53047eb6.mp3"}, {"front": "I will send you something", "back": "θα σου στείλω κάτι", "audio": "hypertts-f8eb83f6eedd710bde264fda3f017950511736e6b738ea54b15817e3.mp3"}, {"front": "I put", "back": "βάζω", "audio": "hypertts-65be9cf2640325bf8f8cbcdc45b4d95e8925af68d708bff3cd5e6e29.mp3"}, {"front": "I am putting it here", "back": "το βάζω εδώ", "audio": "hypertts-3da708416e4ac2c03c50394e517dcce13b9bd2870e6cad229ac8f506.mp3"}, {"front": "Shall I put it here?", "back": "να το βάλω εδώ;", "audio": "hypertts-e59fb429f3d4d4a081c51bd8bc2039b45ed94ac2aaffc1c7f862fa7d.mp3"}, {"front": "Let's put it here", "back": "ας το βάλουμε εδώ", "audio": "hypertts-64224d7cb268424745c8d739791546ba1ec3f694185d0ae9ac5b78dd.mp3"}, {"front": "Salt", "back": "Το αλάτι", "audio": "hypertts-1d77c66ea5443689617a3cd7f59c38e738c6cc0fba6afe1bb67216d7.mp3"}, {"front": "We have to put salt on it (masc.)", "back": "πρέπει να του βάλουμε αλάτι", "audio": "hypertts-63e72a30f10fd5c62ac247c03be257e05320d12b2a96e17568bf8a99.mp3"}, {"front": "We have to put salt on it (fem.)", "back": "πρέπει να της βάλουμε αλάτι", "audio": "hypertts-2779f51b98e090a7d35ab1f10b61a8dac701998cc7c23ce56380e728.mp3"}, {"front": "We have to put salt on them (fem. plural)", "back": "πρέπει να τους βάλουμε αλάτι", "audio": "hypertts-22c80a0c1691d37c029b03f1f37f72f45b3f89470d4593575865bc4a.mp3"}, {"front": "I have to eat", "back": "πρέπει να φάω", "audio": "hypertts-a2941a7bc3bd89204db7732a3acf58d2232186e19c5adbde60a66c71.mp3"}, {"front": "I have eaten", "back": "έχω φάει", "audio": "hypertts-9f988d876161f1401779a843ece4d660a5233c5086490ede099404d4.mp3"}, {"front": "I have to send it", "back": "πρέπει να το στείλω", "audio": "hypertts-07f0156318861a1236645b25faafcb6c1e46037ecd43a3b5695ccf88.mp3"}, {"front": "I have sent it", "back": "το έχω στείλει", "audio": "hypertts-49289f9cbe2e3eb1511cb985405d1e48fe76aae70b9e6294009f5044.mp3"}, {"front": "I will have sent it", "back": "θα το έχω στείλει", "audio": "hypertts-d8303ca4c1a78f6151c43e630efbec13f56702191aefff126aae485f.mp3"}, {"front": "I will have to send it", "back": "θα πρέπει να το στείλω", "audio": "hypertts-dda7868f37ad04fe855bb433f08ffad645975dd0c88e854668f1b9ab.mp3"}, {"front": "When will you send it?", "back": "πότε θα το στείλεις;", "audio": "hypertts-f61fb38ede013b0ed345270265c5babf8363211f9d7cd3661d02606d.mp3"}, {"front": "By then / until then", "back": "Μέχρι τότε", "audio": "hypertts-ae38f256f90b514f582cee426fd68f544645aec18725c9675b177bce.mp3"}, {"front": "I will have sent it by then", "back": "θα το έχω στείλει μέχρι τότε", "audio": "hypertts-ea597d3503a04c5f60f43fe058473a8e16abca3e59c4fe33f857d2d6.mp3"}, {"front": "I will send it to you so that you see it", "back": "θα σου το στείλω για να το δεις", "audio": "hypertts-857f9e17c16c721e2669720bcbd020ff00c8e992cad6f57cfbdac19d.mp3"}, {"front": "I have left them there so that they send them (neuter)", "back": "τα έχω αφήσει εκεί για να τα στείλουν", "audio": "hypertts-4ea5917f18a163d9d629e5ed70bc86e7cc463f18db6c52654b313b1c.mp3"}, {"front": "The day", "back": "η μέρα", "audio": "hypertts-26661afcebd4948c921027c8da9b08da46fbe382ec67eb26a697c031.mp3"}, {"front": "The days", "back": "οι μέρες", "audio": "hypertts-daf2deafd537fd0934559aa3cc9cf92580a5a26d92943785d10ba557.mp3"}, {"front": "I haven't cooked for days", "back": "έχω μέρες να μαγειρέψω", "audio": "hypertts-a4f5514846e28070c43bf2dfdff5aba7946b0b665e12f09e6da45ca2.mp3"}, {"front": "I haven't cooked for him for days", "back": "έχω μέρες να του μαγειρέψω", "audio": "hypertts-5b10e0bda4c3619db3c7f035543b897faa9c20296ba0679a3a65ad87.mp3"}, {"front": "I haven't cooked for them for days", "back": "έχω μέρες να τους μαγειρέψω", "audio": "hypertts-3d978a2471bde66b4fe038b7e16fc2b671cbf31dc95bfac280731510.mp3"}, {"front": "I haven't seen them for days (mixed group)", "back": "έχω μέρες να τους δω", "audio": "hypertts-52c0331560e9d6441b08662a969312bd5b38a5ded332f4de9cfe5c7c.mp3"}, {"front": "I haven't seen them for days (women)", "back": "έχω μέρες να τις δω", "audio": "hypertts-5b0cbf7425de011c27fde11be22366bea8ecf0e0c9386cef2d8b3aef.mp3"}, {"front": "I haven't seen them (women)", "back": "δεν τις έχω δει", "audio": "hypertts-92d5698e38a5324de6a7555b43b291fae5b0e00442e9abc828dc9529.mp3"}, {"front": "I haven't seen them here for days (men)", "back": "έχω μέρες να τους δω εδώ", "audio": "hypertts-50872fe37380692d6ba4782cef83592f8269f70dfdf21369751ad367.mp3"}, {"front": "Seven", "back": "Εφτά", "audio": "hypertts-d1a81228a21851fe48a47a1ad10970b0a22205f08ab8806a2b4c7709.mp3"}, {"front": "Week", "back": "Εβδομάδα", "audio": "hypertts-959723e59cea63f1c4db07ddc0c6a4e3a90b3b799df6171cd881d225.mp3"}, {"front": "The weeks", "back": "Οι εβδομάδες", "audio": "hypertts-286a6dd1af5466d4f8634ecc8f19484d879eda66acf4df4f32284cb4.mp3"}, {"front": "I haven't seen a movie for weeks", "back": "έχω εβδομάδες να δω μια ταινία", "audio": "hypertts-06cea14d7d2ce0268cc462082b71e88a97e6bb8e11f6fc671fe72346.mp3"}, {"front": "A year", "back": "Ένας χρόνος", "audio": "hypertts-2dd1cc35000b26afdf2b7e905c848f00900414a02c23456653a79338.mp3"}, {"front": "I haven't worked for 7 years", "back": "έχω εφτά χρόνια να δουλέψω", "audio": "hypertts-fecdcf34a20facb4acafff99de75554eca819dc90c4c626d6c62bdef.mp3"}, {"front": "Eight", "back": "οκτώ", "audio": "hypertts-57be4d6632577920962cd5db145edb93b7ee47de6c80b09299da89ba.mp3"}, {"front": "They haven't worked in 8 years", "back": "Έχουν οκτώ χρόνια να δουλέψουν", "audio": "hypertts-0c5b88f7c69b19fd3ff808b3760af6f6d3a922158cccb1b7596b809c.mp3"}, {"front": "I haven't seen you for years", "back": "Έχω χρόνια να σε δω", "audio": "hypertts-51a7ae24e8405b090df55ccd6d504669773f3684bc5ba3297801b5ca.mp3"}, {"front": "I haven't seen you in years (expression)", "back": "Δεν σε έχω δει εδώ και χρόνια", "audio": "hypertts-46f717ccd5c72a19afa825dbc3284740642c146ed0229227d056dff5.mp3"}, {"front": "I dance", "back": "χορεύω", "audio": "hypertts-464e27a317e14f56465ba8dcf5cb142f4fca76c4b1b5162a9fc64689.mp3"}, {"front": "I haven't danced for years", "back": "Έχω χρόνια να χορέψω", "audio": "hypertts-cc6aaf0b556e21b54298559df81ad1ebb8e2d7495eb9cf867005f1bc.mp3"}, {"front": "I haven't danced in years (expression)", "back": "δεν έχω χορέψει εδώ και χρόνια", "audio": "hypertts-0e055fea09ce7ea1149ab7bcb2ba1a6d0edaa2abb9fe96d92454e4c0.mp3"}];
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
let deck=shuffle(CARDS);let pos=0;let currentAudio=null;
function updateProgress(){
  document.getElementById('current-num').textContent=pos+1;
  document.getElementById('total-num').textContent=deck.length;
  document.getElementById('prog').style.width=Math.round(((pos+1)/deck.length)*100)+'%';
  document.getElementById('prev-btn').disabled=pos===0;
}
function showCard(){
  const card=deck[pos];
  document.getElementById('card-inner').classList.remove('flipped');
  document.getElementById('eng-text').textContent=card.front;
  document.getElementById('greek-text').textContent=card.back;
  document.getElementById('audio-btn').classList.remove('playing');
  document.getElementById('tap-hint').style.display='';
  if(currentAudio){currentAudio.pause();currentAudio=null;}
  updateProgress();
}
function flipCard(){
  const flipped=document.getElementById('card-inner').classList.toggle('flipped');
  if(flipped){document.getElementById('tap-hint').style.display='none';playAudio();}
  else{document.getElementById('tap-hint').style.display='';}
}
function playAudio(){
  const card=deck[pos];
  if(currentAudio){currentAudio.pause();currentAudio=null;}
  const btn=document.getElementById('audio-btn');
  const audio=new Audio(AUDIO_PATH+card.audio);
  currentAudio=audio;btn.classList.add('playing');
  audio.play().catch(()=>{});
  audio.onended=()=>{btn.classList.remove('playing');currentAudio=null;};
  audio.onerror=()=>{btn.classList.remove('playing');currentAudio=null;};
}
function nextCard(){if(pos<deck.length-1){pos++;showCard();}else{showDone();}}
function prevCard(){if(pos>0){pos--;showCard();}}
function showDone(){
  document.getElementById('study-view').classList.add('hidden');
  document.getElementById('done-view').classList.remove('hidden');
}
function restart(){
  deck=shuffle(CARDS);pos=0;
  document.getElementById('done-view').classList.add('hidden');
  document.getElementById('study-view').classList.remove('hidden');
  showCard();
}
showCard();
</script>
</body>
</html>
