<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Polylogue — Lesson 3: Using και to Link Ideas</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f4f0; min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 2rem 1rem; color: #1a1a1a; }
  #app { width: 100%; max-width: 520px; }
  header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; }
  .back-link { font-size: 13px; color: #888; text-decoration: none; display: flex; align-items: center; gap: 5px; }
  .back-link:hover { color: #1a1a1a; }
  .deck-tag { font-size: 12px; color: #888; background: #fff; border: 1px solid #e5e5e5; padding: 4px 12px; border-radius: 99px; }
  .progress-bar { height: 3px; background: #e5e5e5; border-radius: 99px; overflow: hidden; margin-bottom: 1.25rem; }
  .progress-fill { height: 100%; background: #1D9E75; border-radius: 99px; transition: width 0.4s ease; width: 0%; }
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 1.5rem; }
  .stat { background: #fff; border: 1px solid #e5e5e5; border-radius: 10px; padding: 12px; text-align: center; }
  .stat-num { font-size: 22px; font-weight: 600; color: #1a1a1a; }
  .stat-label { font-size: 11px; color: #999; margin-top: 2px; text-transform: uppercase; letter-spacing: 0.04em; }
  .card-scene { perspective: 1200px; margin-bottom: 1rem; cursor: pointer; user-select: none; }
  .card-inner { position: relative; width: 100%; transform-style: preserve-3d; transition: transform 0.45s cubic-bezier(0.4,0,0.2,1); }
  .card-inner.flipped { transform: rotateY(180deg); }
  .card-face { backface-visibility: hidden; -webkit-backface-visibility: hidden; background: #fff; border: 1px solid #e5e5e5; border-radius: 16px; padding: 2.5rem 2rem; min-height: 200px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; }
  .card-back { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: rotateY(180deg); }
  .card-label { font-size: 11px; color: #bbb; letter-spacing: 0.08em; text-transform: uppercase; }
  .card-text { font-size: 24px; font-weight: 500; color: #1a1a1a; text-align: center; line-height: 1.35; }
  .card-text.greek { font-size: 26px; }
  .audio-btn { display: flex; align-items: center; gap: 7px; padding: 7px 16px; border: 1px solid #e0e0e0; border-radius: 99px; background: transparent; color: #888; font-size: 13px; cursor: pointer; transition: background 0.15s; font-family: inherit; }
  .audio-btn:hover { background: #f5f4f0; color: #555; }
  .audio-btn.playing { color: #1D9E75; border-color: #1D9E75; }
  .tap-hint { text-align: center; font-size: 13px; color: #bbb; margin-bottom: 1rem; height: 20px; }
  .rating-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 1.5rem; }
  .rating-btn { padding: 12px 4px; border-radius: 10px; border: 1px solid #e5e5e5; background: #fff; cursor: pointer; font-size: 13px; font-weight: 500; font-family: inherit; display: flex; flex-direction: column; align-items: center; gap: 4px; transition: background 0.15s; }
  .rating-btn:hover { background: #f5f4f0; }
  .rating-btn .icon { font-size: 16px; }
  .rating-btn .rlabel { font-size: 10px; color: #aaa; font-weight: 400; }
  .r-again .icon { color: #C0392B; } .r-hard .icon { color: #E67E22; } .r-good .icon { color: #2980B9; } .r-easy .icon { color: #1D9E75; }
  .hidden { display: none !important; }
  .done-screen { background: #fff; border: 1px solid #e5e5e5; border-radius: 16px; padding: 2.5rem 2rem; text-align: center; }
  .done-title { font-size: 22px; font-weight: 600; color: #1a1a1a; margin-bottom: 8px; }
  .done-sub { font-size: 14px; color: #888; margin-bottom: 1.5rem; }
  .done-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 1.5rem; }
  .btn-row { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
  .action-btn { padding: 11px 28px; border: 1px solid #e0e0e0; border-radius: 10px; background: transparent; color: #1a1a1a; font-size: 14px; font-family: inherit; cursor: pointer; transition: background 0.15s; text-decoration: none; display: inline-block; }
  .action-btn:hover { background: #f5f4f0; }
  @media (max-width: 400px) { .card-text { font-size: 18px; } .card-text.greek { font-size: 20px; } .card-face { padding: 2rem 1.25rem; min-height: 170px; } }
</style>
</head>
<body>
<div id="app">
  <header>
    <a href="/" class="back-link">
      <svg width="14" height="14" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 2L4 6l4 4"/></svg>
      All lessons
    </a>
    <span class="deck-tag">Unit 2 · Lesson 3</span>
  </header>

  <div id="study-view">
    <div class="progress-bar"><div class="progress-fill" id="prog"></div></div>
    <div class="stats">
      <div class="stat"><div class="stat-num" id="s-due">0</div><div class="stat-label">Due</div></div>
      <div class="stat"><div class="stat-num" id="s-good">0</div><div class="stat-label">Good</div></div>
      <div class="stat"><div class="stat-num" id="s-again">0</div><div class="stat-label">Again</div></div>
    </div>
    <div class="card-scene" onclick="flipCard()">
      <div class="card-inner" id="card-inner">
        <div class="card-face">
          <span class="card-label">English</span>
          <div class="card-text" id="eng-text">—</div>
        </div>
        <div class="card-face card-back">
          <span class="card-label">Greek</span>
          <div class="card-text greek" id="greek-text">—</div>
          <button class="audio-btn" id="audio-btn" onclick="event.stopPropagation(); playAudio()">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M3 6H1v4h2l4 3V3L3 6zM11.5 8c0-1.5-.8-2.8-2-3.5v7c1.2-.7 2-2 2-3.5zM14 8c0-2.8-1.6-5.2-4-6.3v1.1C11.8 3.7 13 5.7 13 8s-1.2 4.3-3 5.2v1.1C12.4 13.2 14 10.8 14 8z"/></svg>
            Listen
          </button>
        </div>
      </div>
    </div>
    <p class="tap-hint" id="tap-hint">Tap to reveal the Greek</p>
    <div class="rating-row hidden" id="rating-row">
      <button class="rating-btn r-again" onclick="rate(0)"><span class="icon">✕</span><span class="rlabel">Again</span></button>
      <button class="rating-btn r-hard" onclick="rate(1)"><span class="icon">~</span><span class="rlabel">Hard</span></button>
      <button class="rating-btn r-good" onclick="rate(2)"><span class="icon">✓</span><span class="rlabel">Good</span></button>
      <button class="rating-btn r-easy" onclick="rate(3)"><span class="icon">✓✓</span><span class="rlabel">Easy</span></button>
    </div>
  </div>

  <div id="done-view" class="done-screen hidden">
    <div class="done-title">Session complete</div>
    <div class="done-sub" id="done-msg"></div>
    <div class="done-stats">
      <div class="stat"><div class="stat-num" id="d-good">0</div><div class="stat-label">Good</div></div>
      <div class="stat"><div class="stat-num" id="d-again">0</div><div class="stat-label">Again</div></div>
      <div class="stat"><div class="stat-num" id="d-total">0</div><div class="stat-label">Total</div></div>
    </div>
    <div class="btn-row">
      <button class="action-btn" onclick="restartAll()">Study again</button>
      <a href="/" class="action-btn">All lessons</a>
    </div>
  </div>
</div>
<script>
const AUDIO_PATH = 'audio/';
const STORAGE_KEY = 'polylogue_u2l3_v3';
const CARDS = [{"front": "I see it and I want to have it", "back": "Το βλέπω και θέλω να το έχω", "audio": "hypertts-aa738e8663b2978f26dd871de38a017b909d2e432a5c9b366a35103f.mp3"}, {"front": "I don't know and I don't want to know", "back": "Δεν ξέρω και δεν θέλω να ξέρω", "audio": "hypertts-53d88de9b95a3b44f08396b509fc2ff02e303b8d1f01e9e0a12ac7e6.mp3"}, {"front": "I don't know it and I don't want to know it", "back": "Δεν το ξέρω και δεν θέλω να το ξέρω", "audio": "hypertts-e9ccc9c6f77df6ed21d7b3209f9e111c3fcc055014bfdea015a8811f.mp3"}, {"front": "I see it too (me too)", "back": "το βλέπω και εγώ", "audio": "hypertts-421e3dd394e31f0fd856265eb1e0d45df95f22c45fbd7594052b7a99.mp3"}, {"front": "I also want it (me too)", "back": "και εγώ το θέλω", "audio": "hypertts-212cc3842a3a257bf889c627735f49df9b8b4d1121fe550c5acc734e.mp3"}, {"front": "I also want to do it (me too)", "back": "και εγώ θέλω να το κάνω", "audio": "hypertts-a839970f39678395b6312ecdddfa18c2c821954b1482b8fbc4166cee.mp3"}, {"front": "I also want the car (me too)", "back": "και εγώ θέλω το αυτοκίνητο", "audio": "hypertts-f67c17af8b343e2ea33d64f441947581c5fbf6e032bc835d427a542b.mp3"}, {"front": "I also want the car (as well as other things)", "back": "θέλω και το αυτοκίνητο", "audio": "hypertts-08acc5391970a013032ea00e8f952800283ecdd102c9400048c39401.mp3"}, {"front": "I also have the mobile phone (me too)", "back": "έχω το κινητό και εγώ", "audio": "hypertts-d280a8df838664c5dd22f15c8c3af10baac5cc836f6376317562bf2c.mp3"}, {"front": "I also have the mobile phone (as well as other things)", "back": "έχω και το κινητό", "audio": "hypertts-048861e716c52e8646acef7bbd4898c2e8ee0dc95f50ce1ddc17b586.mp3"}, {"front": "I also have the car (as well as other things)", "back": "έχω και το αυτοκίνητο", "audio": "hypertts-9a6a391f3a1290b3239c56c6270b8df4e207b6141675fe0feec5a34d.mp3"}, {"front": "I want this", "back": "θέλω αυτό", "audio": "hypertts-e81519ff6cbfb8e8c5e4c519edeb6312b5b365525caeed93a16ba80b.mp3"}, {"front": "I don't want this", "back": "δεν θέλω αυτό", "audio": "hypertts-546ac3fbeced90c51cebf073154edc767d03eb0f94e1983d89f4ec3e.mp3"}, {"front": "This mobile phone", "back": "αυτό το κινητό", "audio": "hypertts-500d3c29b4e30abfacd772ef42bc30226ad761e90224c2e25b4c15d8.mp3"}, {"front": "Don't you want this mobile phone?", "back": "δεν θέλεις αυτό το κινητό;", "audio": "hypertts-99bb22d9ac65fa4387a291830f9725da5bc7b8239295a05b81a2cb16.mp3"}, {"front": "Don't you have this mobile phone?", "back": "Δεν έχεις αυτό το κινητό;", "audio": "hypertts-84927f5c265e904c95d9751de21a31ff028a7c6011e830b56956e175.mp3"}, {"front": "This problem", "back": "αυτό το πρόβλημα", "audio": "hypertts-93ba7f3bf0ecee6fbe8eb0bc0948c6645c4c867065bc086129ca54e8.mp3"}, {"front": "I don't have this problem", "back": "δεν έχω αυτό το πρόβλημα", "audio": "hypertts-216192e79980736016b89437a4f71e87766c8db823464779efca9782.mp3"}];

function loadState() {
  try { const r = localStorage.getItem(STORAGE_KEY); if (r) return JSON.parse(r); } catch(e) {}
  return null;
}

function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
}

function buildDeck() {
  return CARDS.map(c => ({...c, interval:1, ef:2.5, nextDue:0, reps:0}));
}

function startSession(deck) {
  const today = Math.floor(Date.now() / 86400000);
  const due = deck.map((_,i) => i).filter(i => deck[i].nextDue <= today).sort(() => Math.random() - 0.5);
  return { queue: due, againQueue: [], goodCount: 0, againCount: 0, done: false };
}

let state = loadState();
if (!state) {
  const deck = buildDeck();
  state = { deck, session: startSession(deck) };
  saveState();
} else if (!state.session || state.session.done) {
  state.session = startSession(state.deck);
  saveState();
}

let currentAudio = null;
let currentIdx = null;

function nextCard() {
  const s = state.session;
  if (s.againQueue.length > 0) return s.againQueue[0];
  if (s.queue.length > 0) return s.queue[0];
  return null;
}

function updateStats() {
  const s = state.session;
  const due = s.queue.length + s.againQueue.length;
  document.getElementById('s-due').textContent = due;
  document.getElementById('s-good').textContent = s.goodCount;
  document.getElementById('s-again').textContent = s.againCount;
  const total = s.queue.length + s.againQueue.length + s.goodCount;
  const done = s.goodCount;
  document.getElementById('prog').style.width = total > 0 ? Math.round((done/total)*100)+'%' : '0%';
}

function showCard(idx) {
  currentIdx = idx;
  const card = state.deck[idx];
  document.getElementById('card-inner').classList.remove('flipped');
  document.getElementById('eng-text').textContent = card.front;
  document.getElementById('greek-text').textContent = card.back;
  document.getElementById('rating-row').classList.add('hidden');
  document.getElementById('tap-hint').style.display = '';
  document.getElementById('audio-btn').classList.remove('playing');
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  updateStats();
}

function flipCard() {
  if (currentIdx === null) return;
  const flipped = document.getElementById('card-inner').classList.toggle('flipped');
  if (flipped) {
    document.getElementById('rating-row').classList.remove('hidden');
    document.getElementById('tap-hint').style.display = 'none';
    playAudio();
  }
}

function playAudio() {
  if (currentIdx === null) return;
  const card = state.deck[currentIdx];
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  const btn = document.getElementById('audio-btn');
  const audio = new Audio(AUDIO_PATH + card.audio);
  currentAudio = audio;
  btn.classList.add('playing');
  audio.play().catch(()=>{});
  audio.onended = ()=>{btn.classList.remove('playing');currentAudio=null;};
  audio.onerror = ()=>{btn.classList.remove('playing');currentAudio=null;};
}

function sm2(card, q) {
  if (q === 0) {
    card.reps = 0; card.interval = 1;
  } else if (q === 1) {
    card.interval = Math.max(1, Math.round(card.interval * 1.2));
  } else if (q === 2) {
    if (card.reps === 0) card.interval = 1;
    else if (card.reps === 1) card.interval = 6;
    else card.interval = Math.round(card.interval * card.ef);
    card.reps += 1;
  } else {
    if (card.reps === 0) card.interval = 1;
    else if (card.reps === 1) card.interval = 6;
    else card.interval = Math.round(card.interval * card.ef * 1.3);
    card.reps += 1;
  }
  card.ef = Math.max(1.3, card.ef + 0.1 - (3-q)*(0.08+(3-q)*0.02));
  const today = Math.floor(Date.now()/86400000);
  card.nextDue = today + card.interval;
}

function rate(q) {
  if (currentIdx === null) return;
  const s = state.session;
  const isFromAgain = s.againQueue.length > 0 && s.againQueue[0] === currentIdx;

  if (q === 0) {
    // Again — remove from current position, push to end of againQueue
    if (isFromAgain) { s.againQueue.shift(); } else { s.queue.shift(); }
    s.againQueue.push(currentIdx);
    s.againCount++;
  } else {
    // Hard / Good / Easy — card is done for this session
    sm2(state.deck[currentIdx], q);
    if (isFromAgain) { s.againQueue.shift(); } else { s.queue.shift(); }
    s.goodCount++;
  }

  saveState();
  const next = nextCard();
  if (next === null) { showDone(); } else { showCard(next); }
}

function showDone() {
  state.session.done = true;
  saveState();
  document.getElementById('study-view').classList.add('hidden');
  document.getElementById('done-view').classList.remove('hidden');
  document.getElementById('d-good').textContent = state.session.goodCount;
  document.getElementById('d-again').textContent = state.session.againCount;
  document.getElementById('d-total').textContent = state.session.goodCount + state.session.againCount;
  const today = Math.floor(Date.now()/86400000);
  const due = state.deck.filter(c => c.nextDue <= today).length;
  document.getElementById('done-msg').textContent = due > 0 ? due+' cards due tomorrow — come back!' : 'All caught up! Come back tomorrow.';
}

function restartAll() {
  state.deck = buildDeck();
  state.session = startSession(state.deck);
  saveState();
  document.getElementById('done-view').classList.add('hidden');
  document.getElementById('study-view').classList.remove('hidden');
  const next = nextCard();
  if (next !== null) showCard(next); else showDone();
}

const first = nextCard();
if (first !== null) { showCard(first); } else { showDone(); }
</script>
</body>
</html>
