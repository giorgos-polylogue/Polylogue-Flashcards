<style>

  .nav-btn { padding: 14px 4px; border-radius: 10px; border: 1px solid #e5e5e5; background: #fff; cursor: pointer; font-size: 14px; font-weight: 500; font-family: inherit; color: #1a1a1a; transition: background 0.15s, opacity 0.15s; display: flex; align-items: center; justify-content: center; gap: 6px; }

<body>
<div id="app">

    <div class="card-scene" onclick="flipCard()">

          <span class="card-label">Greek</span>

  </div>
</div>
<script>
const AUDIO_PATH='audio/';
const CARDS=[{"front": "I would change it", "back": "θα το άλλαζα", "audio": "hypertts-70b472458161529aa2332f9853f574836c2f7ed0a1303b37ab442d97.mp3"}, {"front": "I wouldn't change it", "back": "δεν θα το άλλαζα", "audio": "hypertts-0550afacb4ccda6dab4f8ff43eb14cc270aa4f6d7a144335830e51df.mp3"}, {"front": "I won't change it", "back": "δεν θα το αλλάξω", "audio": "hypertts-8e3538869c4358c84a2288e990143a0de4338358c4e3cacf1318c82a.mp3"}, {"front": "We were buying it (feminine)", "back": "την αγοράζαμε", "audio": "hypertts-b136f095f833e8665ad33f223f69e300fcd05726f058f978e48d0ad1.mp3"}, {"front": "We would buy it (feminine)", "back": "θα την αγοράζαμε", "audio": "hypertts-a381879cc4ddbbfad19080f6dac1c4e9a54e334343981dd36521daaf.mp3"}, {"front": "I would do it", "back": "θα το έκανα", "audio": "hypertts-74a7dccd339b2fa5549c35f0841feb34d3322943e966740f9b4f2560.mp3"}, {"front": "I wouldn't do it", "back": "δεν θα το έκανα", "audio": "hypertts-74cede0dcf0ce7e16e5f5a279ca46882f1827cef6557839254601048.mp3"}, {"front": "Would you do it?", "back": "θα το έκανες;", "audio": "hypertts-3fdb58b03806c2a6a97a5cf2b15fa961fc2fb3326a829e45e30d7313.mp3"}, {"front": "I was working", "back": "δούλευα", "audio": "hypertts-591b070ba5d730deb1488c950fb6612bf238bd8e6e0a798756e9682d.mp3"}, {"front": "I was going to work", "back": "θα δούλευα", "audio": "hypertts-3e4fc1471cb5f9ac1c8ba6ce31a3c23f2265aaca5356df8d8ab13cb6.mp3"}, {"front": "I was going to work but I had to do something", "back": "θα δούλευα αλλά έπρεπε να κάνω κάτι", "audio": "hypertts-10d452c2b488dda66fe394b751f633fa1e46d5b5fa84fba828fdaacb.mp3"}, {"front": "I would do it but I had to work", "back": "θα το έκανα αλλά έπρεπε να δουλέψω", "audio": "hypertts-2a82a30ac0dcc9d26e77ac01f566f9a656e5a951ff7d22297325b7f3.mp3"}, {"front": "I was going to work but I had to stay at home", "back": "θα δούλευα αλλά έπρεπε να μείνω σπίτι", "audio": "hypertts-7ba35a2d8367d6755f30dbf1d0b319a576eccc90d6b9de1ed2e8d6ed.mp3"}, {"front": "He had to change his clothes", "back": "έπρεπε να αλλάξει τα ρούχα του", "audio": "hypertts-8868203688d5af22b650c2aa5aad366719443ea8ffbf2218b49c7438.mp3"}, {"front": "He was going to change his clothes", "back": "θα άλλαζε τα ρούχα του", "audio": "hypertts-2b71d61309eed84acfcbda0de3915a04c17dfb7d418f1b3ee10e709c.mp3"}, {"front": "You should change your clothes", "back": "θα έπρεπε να αλλάξεις τα ρούχα σου", "audio": "hypertts-91a90bd869f6a6d30281b512f503acea9e66236bb9d2306b0adebdb8.mp3"}, {"front": "You should change them", "back": "θα έπρεπε να τα αλλάξεις", "audio": "hypertts-92a3fa110869b38b212365eb12d4c2e0e306531017959875c67422f2.mp3"}, {"front": "I was giving", "back": "έδινα", "audio": "hypertts-6c5842f06a9c51fa45244df1dab0fbb95cd1625da2db275870b87938.mp3"}, {"front": "I would give", "back": "θα έδινα", "audio": "hypertts-80938a16c5f6edb692fd70c78dba64b1c96a08a88146d9009d3cf5ca.mp3"}, {"front": "I would give it to you", "back": "θα σου το έδινα", "audio": "hypertts-c2af3b4de9da13e8cfdbe9f2c204bb8f3811b7745823411633360729.mp3"}, {"front": "Tired", "back": "κουρασμένος", "audio": "hypertts-0ce6dfc2fda230f0a263c52c0a338e91357858c90833f2b99ede5042.mp3"}, {"front": "I'm tired", "back": "είμαι κουρασμένος", "audio": "hypertts-178301913f7bb1af2301015821f468e2857b46bc198a6108a6ca1d36.mp3"}, {"front": "I'm tired (feminine)", "back": "είμαι κουρασμένη", "audio": "hypertts-19455149a272c213d5beeebaf04fca9774f49d93a30fe8eb99947a2a.mp3"}, {"front": "Happy", "back": "ευτυχισμένος", "audio": "hypertts-883127c080ffcaf442708e3f834d8e69c5ab460b8bcaec6e03caa24c.mp3"}, {"front": "I am happy", "back": "είμαι ευτυχισμένος", "audio": "hypertts-d3f9235ac9bc67886f42e9fc9a5718c89495d91f230314674ba2b2c8.mp3"}, {"front": "Are you happy?", "back": "είσαι ευτυχισμένος;", "audio": "hypertts-b5510178c272b2a5c103a71fc9ba807339cdec3f81b63591dd72bde9.mp3"}, {"front": "I was", "back": "ήμουν", "audio": "hypertts-3d413fa1a5fd10728b55559e13690322b4617d0de71a358ede3b43b9.mp3"}, {"front": "I was happy", "back": "ήμουν ευτυχισμένος", "audio": "hypertts-8f3f8af1fd4851b55d39ce330ff26f779f3f2ea8829570f0c8c9dac8.mp3"}, {"front": "I would be happy", "back": "θα ήμουν ευτυχισμένος", "audio": "hypertts-a9e70cd6de35629ce52d75cf705deb511454763579890794a5308588.mp3"}, {"front": "I was tired", "back": "ήμουν κουρασμένος", "audio": "hypertts-0c340cc9bd7125851a2e9d9bad7fa9b1b04fb309001956a73dd22cb0.mp3"}, {"front": "You were", "back": "ήσουν", "audio": "hypertts-b09205f013869b54ab162b6e283ba5b7744bddaf456052d044f5810f.mp3"}, {"front": "Where were you?", "back": "που ήσουν;", "audio": "hypertts-68a856e73d66cc9909fa4539e50873e9b13ef9dce027766b1e8ad37f.mp3"}, {"front": "Were you happy?", "back": "ήσουν ευτυχισμένος;", "audio": "hypertts-1f24eb572e0e9bd5784e8b3698d8308c2fdb333c76ddb9da5c368d6b.mp3"}, {"front": "Weren't you happy there?", "back": "δεν ήσουν ευτυχισμένος εκεί;", "audio": "hypertts-e22a90dd5b0d8b70dd5e4e62e046375ff35e6f34b063f137ec0f07fb.mp3"}, {"front": "I am calling you", "back": "σε παίρνω τηλέφωνο", "audio": "hypertts-6cc6074de586a9a9bc080120e660159581d3ffa866e941b44ceea5e8.mp3"}, {"front": "I was calling you", "back": "σε έπαιρνα τηλέφωνο", "audio": "hypertts-66164830422c2d1966492a1c4c794809f9d61edaf7bf4965a5a41a87.mp3"}, {"front": "I was going to call you / I would call you", "back": "θα σε έπαιρνα τηλέφωνο", "audio": "hypertts-19c1467e24363646e891ad4ff82d227decd23dcd016b7d44c78c7a74.mp3"}, {"front": "I was going to call you but I was tired", "back": "θα σε έπαιρνα τηλέφωνο αλλά ήμουν κουρασμένος", "audio": "hypertts-9585f317fce4050f96b8682f89c50c328ebef2608749f0b76e39790f.mp3"}, {"front": "You should call me", "back": "θα έπρεπε να με πάρεις τηλέφωνο", "audio": "hypertts-1eea96b7301d71e8541f064a7334e08fc87f4509939e7d8a222dbd2b.mp3"}, {"front": "You had to call me", "back": "έπρεπε να με πάρεις τηλέφωνο", "audio": "hypertts-89e9a1f76fceb71ebaa15abd0aaca84103730d7008d5e2f994429fa3.mp3"}];
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
let deck=shuffle(CARDS);let pos=0;let currentAudio=null;
function updateProgress(){
  document.getElementById('current-num').textContent=pos+1;
  document.getElementById('total-num').textContent=deck.length;
  document.getElementById('prog').style.width=Math.round(((pos+1)/deck.length)*100)+'%';
  document.getElementById('prev-btn').disabled=pos===0;
}
function showCard(){
  const card=deck[pos];
  document.getElementById('card-inner').classList.remove('flipped');
  document.getElementById('eng-text').textContent=card.front;
  document.getElementById('greek-text').textContent=card.back;
  document.getElementById('audio-btn').classList.remove('playing');
  document.getElementById('tap-hint').style.display='';
  if(currentAudio){currentAudio.pause();currentAudio=null;}
  updateProgress();
}
function flipCard(){
  const flipped=document.getElementById('card-inner').classList.toggle('flipped');
  if(flipped){document.getElementById('tap-hint').style.display='none';playAudio();}
  else{document.getElementById('tap-hint').style.display='';}
}
function playAudio(){
  const card=deck[pos];
  if(currentAudio){currentAudio.pause();currentAudio=null;}
  const btn=document.getElementById('audio-btn');
  const audio=new Audio(AUDIO_PATH+card.audio);
  currentAudio=audio;btn.classList.add('playing');
  audio.play().catch(()=>{});
  audio.onended=()=>{btn.classList.remove('playing');currentAudio=null;};
  audio.onerror=()=>{btn.classList.remove('playing');currentAudio=null;};
}
function nextCard(){if(pos<deck.length-1){pos++;showCard();}else{showDone();}}
function prevCard(){if(pos>0){pos--;showCard();}}
function showDone(){
  document.getElementById('study-view').classList.add('hidden');
  document.getElementById('done-view').classList.remove('hidden');
}
function restart(){
  deck=shuffle(CARDS);pos=0;
  document.getElementById('done-view').classList.add('hidden');
  document.getElementById('study-view').classList.remove('hidden');
  showCard();
}
showCard();
</script>
</body>
</html>
